<head>

    <title>GTU Mathematics Complete Practice Bank</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],

            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #059669;
            --bg-light: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --accent: #2563eb;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5e7eb;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: 80px; /* Space for footer */
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        
        /* Timer Styles */
        #timer-display {
            display: none;
            position: absolute;
            top: 25px;
            right: 35px;
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #d1d5db;
        }
        .control-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label.control-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 1.1em;
        }
        select, button {
            padding: 12px;
            font-size: 1.05em;
            border-radius: 6px;
            border: 1px solid #9ca3af;
        }
        button.primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            margin-top: auto;
        }
        button.primary-btn:hover { background: #1d4ed8; transform: translateY(-2px); }
        button.primary-btn:active { transform: translateY(0); }

        button.action-btn {
            background: var(--secondary);
            color: white;
            border: none;
            font-size: 1.3em;
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button.action-btn:hover { background: #047857; }
        
        button.print-btn {
            background: #4b5563;
        }
        button.print-btn:hover { background: #374151; }
        
        .action-buttons-container {
            display: none;
            gap: 15px;
            margin-top: 30px;
        }
        
        .question-block {
            margin-bottom: 35px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            border-left: 6px solid var(--accent);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .bilingual-en { font-weight: 600; color: #111827; }
        .bilingual-gu { color: var(--text-muted); font-size: 0.95em; margin-top: 8px; margin-bottom: 15px; }
        
        .options {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media(max-width: 700px) { .options { grid-template-columns: 1fr; } }
        
        .options label {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1em;
        }
        .options label:hover { background: #dbeafe; border-color: #93c5fd; }
        .options input[type="radio"] { margin-right: 15px; transform: scale(1.4); }
        .options input[type="radio"]:checked + span { font-weight: bold; color: var(--accent); }
        
        .solution {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 1.05em;
            line-height: 1.8;
            border-top: 2px dashed #ccc;
        }
        .solution-correct { background-color: #f0fdf4; border: 1px solid #86efac; color: #065f46; }
        .solution-incorrect { background-color: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
        
        .step-title { font-weight: bold; color: var(--primary); margin-top: 8px; display: inline-block; }

        /* Overview Summary Card */
        #summary-card {
            display: none;
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 12px;
            border: 2px solid #7dd3fc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .summary-title { font-size: 2em; font-weight: bold; margin-bottom: 10px; }
        .summary-stats { font-size: 1.3em; margin-bottom: 15px; }
        .summary-msg { font-size: 1.2em; font-weight: bold; padding: 10px; border-radius: 6px; display: inline-block; }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            font-size: 0.95em;
            z-index: 1000;
        }
        .footer a { color: #93c5fd; text-decoration: none; }
        .footer .visitor-counter { display: flex; align-items: center; gap: 10px; }

        /* Print Specific CSS */
        @media print {
            body { background: #fff; padding: 0; color: #000; }
            .container { box-shadow: none; max-width: 100%; margin: 0; padding: 0; }
            .controls, .action-buttons-container, .footer, #timer-display { display: none !important; }
            .question-block { page-break-inside: avoid; border: 1px solid #ccc; box-shadow: none; }
            .options label { border: 1px solid #ccc; background: #fff; }
            #summary-card { border: 1px solid #ccc; background: #fff; color: #000; }
        }
    </style>
</head>

<script>
    // --- UTILITY & TIMER FUNCTIONS ---
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let timerInterval;
    let secondsElapsed = 0;

    function startTimer() {
        clearInterval(timerInterval);
        secondsElapsed = 0;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.style.display = 'block';
        timerDisplay.innerText = "⏱ 00:00";
        
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            let s = (secondsElapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `⏱ ${m}:${s}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let s = (secondsElapsed % 60).toString().padStart(2, '0');
        return `${m} minutes and ${s} seconds`;
    }

    // --- EXHAUSTIVE GENERATION ENGINE WITH DETAILED EXPLANATIONS ---
    const generators = {
        "matrix": {
            "mcq": [
                () => { 
                    let r1 = rand(1, 4), c1 = rand(2, 4), r2 = c1, c2 = rand(1, 4);
                    return {
                        en: `If matrix $A$ is of order $${r1} \\times ${c1}$ and $B$ is $${r2} \\times ${c2}$, what is the order of $AB$?`,
                        gu: `જો શ્રેણિક $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${r2} \\times ${c2}$ હોય, તો શ્રેણિક $AB$ ની કક્ષા શું થાય?`,
                        correct: `$${r1} \\times ${c2}$`, distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`],
                        solEn: `<span class="step-title">Step 1:</span> Check condition: Columns of A (${c1}) must equal Rows of B (${r2}).<br><span class="step-title">Step 2:</span> The resulting matrix takes the Rows of A and Columns of B. Thus, $${r1} \\times ${c2}$.`, 
                        solGu: `<span class="step-title">પગલું 1:</span> A ના સ્તંભ અને B ની હાર સમાન હોવી જોઈએ.<br><span class="step-title">પગલું 2:</span> ગુણાકારની કક્ષા A ની હાર અને B ના સ્તંભ જેટલી થાય. તેથી $${r1} \\times ${c2}$.`
                    };
                },
                () => { 
                    let a = rand(-5, 5), b = rand(-5, 5), c = rand(-5, 5), d = rand(-5, 5);
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, then $\\text{adj}(A) =$ ?`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $\\text{adj}(A) =$ ?`,
                        correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-d} & ${b} \\\\ ${c} & ${-a} \\end{bmatrix}$`],
                        solEn: `<span class="step-title">Rule for 2x2 Adjoint:</span><br>1. Swap the main diagonal elements (${a} and ${d}).<br>2. Multiply the off-diagonal elements (${b} and ${c}) by -1.`, 
                        solGu: `મુખ્ય વિકર્ણના ઘટકોની અદલાબદલી કરો અને અન્ય ઘટકોના ચિહ્નો બદલો.`
                    };
                },
                () => {
                    let x = rand(2, 8), y = rand(1, 5), c = rand(1, 9);
                    return {
                        en: `If $\\begin{bmatrix} x - 1 & ${c} \\\\ 2 & y + 2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} & ${c} \\\\ 2 & ${y+2} \\end{bmatrix}$, then $x+y =$ ?`,
                        gu: `જો $\\begin{bmatrix} x - 1 & ${c} \\\\ 2 & y + 2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} & ${c} \\\\ 2 & ${y+2} \\end{bmatrix}$ હોય, તો $x+y =$ ?`,
                        correct: `$${x+y}$`, distractors: [`$${x+y+2}$`, `$${x+y-1}$`, `$${x-y}$`],
                        solEn: `<span class="step-title">Step 1:</span> Equate corresponding elements.<br>$x - 1 = ${x-1} \\implies x = ${x}$.<br><span class="step-title">Step 2:</span> $y + 2 = ${y+2} \\implies y = ${y}$.<br><span class="step-title">Step 3:</span> Add them: ${x} + ${y} = ${x+y}$.`, 
                        solGu: `સમાન સ્થાને રહેલા ઘટકો સરખાવતા: $x=${x}$ અને $y=${y}$. સરવાળો = $${x+y}$.`
                    };
                }
            ],
            "examples": [
                () => { // Inverse Matrix
                    let a = rand(1, 3), b = rand(1, 3), c = rand(2, 4), d = rand(4, 6);
                    let det = (a*d) - (b*c);
                    if(det === 0) { d = d+1; det = (a*d) - (b*c); } 
                    return {
                        en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`,
                        correct: `$\\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\frac{1}{${det}}\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\frac{1}{${det+1}}\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`],
                        solEn: `<span class="step-title">Step 1:</span> Find Determinant $|A| = (${a})(${d}) - (${b})(${c}) = ${det}$.<br><span class="step-title">Step 2:</span> Find Adjoint matrix $\\text{adj}(A) = \\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$.<br><span class="step-title">Step 3:</span> Apply formula $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$.`, 
                        solGu: `<span class="step-title">પગલું 1:</span> નિશ્ચાયક $|A| = ${det}$ મેળવો.<br><span class="step-title">પગલું 2:</span> સહઅવયવજ શ્રેણિક $\\text{adj}(A)$ શોધો.<br><span class="step-title">પગલું 3:</span> $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ સૂત્ર વાપરો.`
                    };
                },
                () => { // Linear Equations
                    let x = rand(1, 3), y = rand(1, 3);
                    let a = rand(2, 4), b = rand(1, 3), c = rand(1, 3), d = rand(2, 4);
                    let e = a*x + b*y, f = c*x - d*y;
                    return {
                        en: `Solve using matrix method: $${a}x + ${b}y = ${e}$ and $${c}x - ${d}y = ${f}$.`,
                        gu: `શ્રેણિક ની મદદ થી સમીકરણ $${a}x + ${b}y = ${e}$ અને $${c}x - ${d}y = ${f}$ ઉકેલો.`,
                        correct: `$x = ${x}, y = ${y}$`, 
                        distractors: [`$x = ${y}, y = ${x}$`, `$x = -${x}, y = ${y}$`, `$x = ${x+1}, y = ${y-1}$`],
                        solEn: `<span class="step-title">Step 1:</span> Write as $AX = B$ where $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & -${d} \\end{bmatrix}$, $B = \\begin{bmatrix} ${e} \\\\ ${f} \\end{bmatrix}$.<br><span class="step-title">Step 2:</span> Find $|A| = (${a})(-${d}) - (${b})(${c})$.<br><span class="step-title">Step 3:</span> Calculate $X = A^{-1}B$ by multiplying the inverse of A with column matrix B.`, 
                        solGu: `<span class="step-title">પગલું 1:</span> $AX = B$ સ્વરૂપમાં લખો.<br><span class="step-title">પગલું 2:</span> $X = A^{-1}B$ નો ઉપયોગ કરો. વ્યસ્ત શ્રેણિક શોધીને $x, y$ મેળવો.`
                    };
                },
                () => { // Matrix Equation
                    let a1 = rand(1,3), a2 = rand(-2,2), a3 = rand(0,4), a4 = rand(1,3);
                    let b1 = rand(2,4), b2 = rand(1,3), b3 = rand(-1,3), b4 = rand(2,5);
                    return {
                        en: `Find matrix $X$ if $2A + X = 3B$, where $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$.`,
                        gu: `જો સમીકરણ $2A + X = 3B$ હોય, તો શ્રેણિક $X$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${3*b1 - 2*a1} & ${3*b2 - 2*a2} \\\\ ${3*b3 - 2*a3} & ${3*b4 - 2*a4} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${2*a1 + 3*b1} & ${2*a2 + 3*b2} \\\\ ${2*a3 + 3*b3} & ${2*a4 + 3*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${b1 - a1} & ${b2 - a2} \\\\ ${b3 - a3} & ${b4 - a4} \\end{bmatrix}$`],
                        solEn: `<span class="step-title">Step 1:</span> Rearrange equation to $X = 3B - 2A$.<br><span class="step-title">Step 2:</span> Multiply matrix B by 3 and matrix A by 2.<br><span class="step-title">Step 3:</span> Subtract corresponding elements.`, 
                        solGu: `સમીકરણ $X = 3B - 2A$ બનાવો. 3B ની ગણતરી કરો અને તેમાંથી 2A બાદ કરો.`
                    };
                }
            ]
        },
        "differentiation": {
            "mcq": [
                () => { 
                    let n = rand(4, 9);
                    return {
                        en: `$\\frac{d}{dx}(x^{${n}}) = $ ?`, gu: `$\\frac{d}{dx}(x^{${n}}) = $ ?`,
                        correct: `$${n}x^{${n-1}}$`, distractors: [`$${n}x^{${n}}$`, `$\\frac{x^{${n+1}}}{${n+1}}$`, `$x^{${n-1}}$`],
                        solEn: `Applying the standard power rule formula: $\\frac{d}{dx}(x^n) = n x^{n-1}$.`, solGu: `ઘાતના નિયમ મુજબ: $\\frac{d}{dx}(x^n) = n x^{n-1}$.`
                    };
                },
                () => { 
                    let k = rand(2, 6);
                    return {
                        en: `$\\frac{d}{dx}(\\sin ${k}x) = $ ?`, gu: `$\\frac{d}{dx}(\\sin ${k}x) = $ ?`,
                        correct: `$${k}\\cos ${k}x$`, distractors: [`$\\cos ${k}x$`, `$-${k}\\cos ${k}x$`, `$\\frac{\\cos ${k}x}{${k}}$`],
                        solEn: `Using the Chain Rule: The derivative of outer function $\\sin(u)$ is $\\cos(u)$. Then multiply by derivative of inner function $${k}x$, which is $${k}$.`, solGu: `સાંકળ નિયમ મુજબ: $\\cos(${k}x) \\cdot \\frac{d}{dx}(${k}x) = ${k}\\cos ${k}x$.`
                    };
                }
            ],
            "examples": [
                () => { // Maxima and Minima
                    let c = rand(1, 15);
                    return {
                        en: `Find the maximum and minimum values of $f(x) = 2x^3 - 3x^2 - 12x + ${c}$.`,
                        gu: `વિધેય $f(x) = 2x^3 - 3x^2 - 12x + ${c}$ ની મહત્તમ અને ન્યૂનત્તમ કિંમત શોધો.`,

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const summaryCard = document.getElementById('summary-card');
        const actionBtns = document.getElementById('action-buttons');
        
        form.innerHTML = '';
        summaryCard.style.display = 'none';
        currentQuizData = [];

        // START TIMER
        startTimer();

        // STRICTLY 30 MCQS OR 15 EXAMPLES
        const numQuestions = type === 'mcq' ? 30 : 15; 
        const availableGenerators = generators[topic][type] || generators[topic]['mcq']; 

        for (let i = 0; i < numQuestions; i++) {
            // Cycle through available methods sequentially 
            const genFunc = availableGenerators[i % availableGenerators.length];
            const qData = genFunc();

            let options = [{text: qData.correct, isCorrect: true}];
            qData.distractors.forEach(d => options.push({text: d, isCorrect: false}));
            options = shuffle(options);
            qData.shuffledOptions = options;

            currentQuizData.push(qData);

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        actionBtns.style.display = 'flex';
        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Test & View Full Solutions";
        
        MathJax.typesetPromise([form]);
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        // STOP TIMER
        const timeTaken = stopTimer();
        document.getElementById('timer-display').style.display = 'none'; // Hide floating timer

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Detailed Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Detailed Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        // Generate Summary Card
        const percentage = Math.round((score / currentQuizData.length) * 100);
        let feedbackMsg = "";
        let feedbackColor = "";
        
        if(percentage >= 80) { feedbackMsg = "Excellent Preparation! Keep it up. (ખૂબ સરસ તૈયારી!)"; feedbackColor = "#059669"; }
        else if(percentage >= 50) { feedbackMsg = "Good job, but keep practicing. (સારી મહેનત, વધુ પ્રેક્ટિસ કરો.)"; feedbackColor = "#d97706"; }
        else { feedbackMsg = "Needs more focus and practice. (વધુ ધ્યાન અને પ્રેક્ટિસ ની જરૂર છે.)"; feedbackColor = "#dc2626"; }

        const summaryCard = document.getElementById('summary-card');
        summaryCard.innerHTML = `
            <div class="summary-title">Test Completed!</div>
            <div class="summary-stats">
                Score: <strong>${score} / ${currentQuizData.length}</strong> (${percentage}%)<br>
                Time Taken: <strong>${timeTaken}</strong>
            </div>
            <div class="summary-msg" style="background-color: ${feedbackColor}; color: white;">${feedbackMsg}</div>
        `;
        summaryCard.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.style.display = 'none';

        MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
