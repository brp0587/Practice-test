<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Semester 2 Mathematics: Complete Practice Bank</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #b91c1c;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #475569;
            --accent: #0284c7;
        }
        
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #cbd5e1;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px; 
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 15px;
        }
        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.2em;
        }
        
        #timer-display {
            display: none;
            position: absolute;
            top: 25px;
            right: 35px;
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* --- NEW: Student Info Section Styling --- */
        .student-info-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #e0f2fe; /* Light blue background for contrast */
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #7dd3fc;
        }
        .info-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        .info-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 1.05em;
        }
        input[type="text"] {
            padding: 12px;
            font-size: 1.05em;
            border-radius: 6px;
            border: 1px solid #64748b;
            width: 100%;
            font-family: inherit;
        }
        input[type="text"]:disabled {
            background-color: transparent;
            color: var(--primary);
            font-weight: bold;
            border-color: transparent;
            padding-left: 0;
        }
        .timestamp-display {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--secondary);
            padding: 10px 0;
        }
        /* ----------------------------------------- */

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #94a3b8;
        }
        .control-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label.control-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 1.1em;
        }
        select, button {
            padding: 12px;
            font-size: 1.05em;
            border-radius: 6px;
            border: 1px solid #64748b;
            width: 100%;
        }
        button.primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            margin-top: auto;
        }
        button.primary-btn:hover { background: #0369a1; transform: translateY(-2px); }
        
        button.action-btn {
            background: #059669;
            color: white;
            border: none;
            font-size: 1.2em;
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button.action-btn:hover { background: #047857; }
        
        button.print-btn { background: #475569; }
        button.print-btn:hover { background: #334155; }
        
        .action-buttons-container {
            display: none;
            flex-direction: column; 
            gap: 15px;
            margin-top: 30px;
        }
        
        .question-block {
            margin-bottom: 30px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            border-left: 6px solid var(--accent);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 1.15em; 
            overflow-x: auto; 
        }
        .question-text {
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        .bilingual-en { font-weight: 600; color: var(--primary); margin-bottom: 8px;}
        .bilingual-gu { color: var(--text-muted); font-size: 0.95em; margin-bottom: 15px; }
        
        .options {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .options label {
            display: flex;
            align-items: flex-start; 
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05em;
            word-break: break-word;
        }
        .options label:hover { background: #e0f2fe; border-color: #38bdf8; }
        .options input[type="radio"] { margin-right: 12px; margin-top: 5px; transform: scale(1.3); flex-shrink: 0; }
        .options input[type="radio"]:checked + span { font-weight: bold; color: var(--accent); }

        .solution {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 1.05em;
            line-height: 1.8;
            border-top: 2px dashed #cbd5e1;
            overflow-x: auto;
        }
        .solution-correct { background-color: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
        .solution-incorrect { background-color: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
        
        .step-container { margin-bottom: 10px; padding: 12px; background: rgba(255,255,255,0.7); border-radius: 6px; border-left: 4px solid var(--accent); overflow-x: auto; }
        .step-title { font-weight: bold; color: var(--primary); display: inline-block; margin-bottom: 5px; }

        #summary-card {
            display: none;
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: #f0f9ff;
            color: #0369a1;
            border-radius: 12px;
            border: 2px solid #38bdf8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .summary-title { font-size: 1.8em; font-weight: bold; margin-bottom: 10px; }
        .summary-stats { font-size: 1.2em; margin-bottom: 15px; }
        .summary-msg { font-size: 1.1em; font-weight: bold; padding: 10px; border-radius: 6px; display: inline-block; }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            font-size: 0.95em;
            z-index: 1000;
        }
        .footer .visitor-counter { display: flex; align-items: center; gap: 10px; }

        @media(max-width: 768px) {
            body { padding: 10px; padding-bottom: 110px; }
            .container { padding: 15px; border-radius: 8px; }
            h1 { font-size: 1.6em; }
            .header-section { padding-bottom: 10px; margin-bottom: 15px; }
            #timer-display { position: static; display: inline-block; margin-top: 10px; font-size: 1.1em; }
            .controls, .student-info-section { padding: 15px; gap: 15px; margin-bottom: 25px; }
            .question-block { padding: 15px; margin-bottom: 20px; font-size: 1.05em; }
            .options { grid-template-columns: 1fr; gap: 10px; }
            .options label { padding: 12px; font-size: 1em; }
            .footer { flex-direction: column; text-align: center; gap: 8px; padding: 10px; }
        }

        @media(min-width: 769px) { .action-buttons-container { flex-direction: row; } }

        @media print {
            body { background: #fff; padding: 0; color: #000; }
            .container { box-shadow: none; max-width: 100%; margin: 0; padding: 0; }
            .controls, .action-buttons-container, .footer, #timer-display { display: none !important; }
            .header-section { border-bottom: 2px solid #000; }
            
            /* Print rules for Student Details */
            .student-info-section { background: #fff; border: 2px solid #000; padding: 15px; margin-bottom: 20px; box-shadow: none; }
            .student-info-section input[type="text"] { border: none; border-bottom: 1px dashed #000; border-radius: 0; }
            .info-label { color: #000; }
            
            .question-block { page-break-inside: avoid; border: 1px solid #ccc; box-shadow: none; margin-bottom: 20px; padding: 15px; overflow-x: visible;}
            .options label { border: 1px solid #ccc; background: #fff; padding: 10px;}
            #summary-card { border: 1px solid #ccc; background: #fff; color: #000; }
            .step-container { background: #f9f9f9; border: 1px solid #ddd; overflow-x: visible; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>Semester 2 Mathematics: Complete Practice</h1>
        <div id="timer-display">⏱ 00:00</div>
    </div>
    
    <div class="student-info-section">
        <div class="info-group">
            <label class="info-label" for="studentName">Student Name:</label>
            <input type="text" id="studentName" placeholder="Enter your full name (Alphabets only)">
        </div>
        <div class="info-group">
            <label class="info-label" for="enrollmentNo">Enrollment No.:</label>
            <input type="text" id="enrollmentNo" placeholder="Enter 12-digit enrollment number" maxlength="12">
        </div>
        <div class="info-group" id="timestamp-group" style="display: none; justify-content: flex-end;">
            <label class="info-label">Test Completed On:</label>
            <div id="test-timestamp" class="timestamp-display"></div>
        </div>
    </div>
    <div class="controls">
        <div class="control-group">
            <label class="control-label" for="topicSelect">1. Select Unit (યુનિટ પસંદ કરો):</label>
            <select id="topicSelect">
                <option value="matrix">Unit 1: Matrices</option>
                <option value="differentiation">Unit 2: Differentiation</option>
                <option value="integration">Unit 3: Integration</option>
                <option value="diffeq">Unit 4: Differential Equations</option>
                <option value="complex">Unit 5A: Complex Numbers</option>
                <option value="statistics">Unit 5B: Statistics</option>
            </select>
        </div>
        <div class="control-group">
            <label class="control-label" for="typeSelect">2. Practice Type (પ્રેક્ટિસ પ્રકાર):</label>
            <select id="typeSelect">
                <option value="mcq">MCQ Objectives (Exactly 20 Questions)</option>
                <option value="examples">Practice Examples (Exactly 15 Questions)</option>
            </select>
        </div>
        <div class="control-group" style="justify-content: flex-end;">
            <button class="primary-btn" onclick="generateQuiz()">Generate Syllabus-Aligned Test</button>
        </div>
    </div>

    <div id="summary-card"></div>
    <form id="quiz-form"></form>
    
    <div class="action-buttons-container" id="action-buttons">
        <button type="button" class="action-btn" id="submit-btn" onclick="gradeQuiz()">Submit Test & View Detailed Solutions</button>
        <button type="button" class="action-btn print-btn" onclick="window.print()">🖨️ Save / Print as PDF</button>
    </div>
</div>

<div class="footer">
    <div class="visitor-counter">
        <span>Page Visits:</span>
        <img src="https://api.visitorbadge.io/api/visitors?path=bhavin.gtu.maths.v12.absolute&countColor=%23b91c1c&style=flat" alt="Visitor Badge" />
    </div>
    <div class="copyright">
        &copy; 2024. Prepared by <strong>Bhavin R Patel</strong> (Lecturer, Maths).
    </div>
</div>

<script>
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let timerInterval;
    let secondsElapsed = 0;
    function startTimer() {
        clearInterval(timerInterval);
        secondsElapsed = 0;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.style.display = window.innerWidth > 768 ? 'block' : 'inline-block';
        timerDisplay.innerText = "⏱ 00:00";
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            let s = (secondsElapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `⏱ ${m}:${s}`;
        }, 1000);
    }
    function stopTimer() {
        clearInterval(timerInterval);
        let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let s = (secondsElapsed % 60).toString().padStart(2, '0');
        return `${m} minutes and ${s} seconds`;
    }

    function renderMath() {
        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(err => console.error('MathJax error:', err));
        } else {
            setTimeout(renderMath, 100);
        }
    }

    // Question Generators Array - Kept Exactly as Original
    const generators = {
        "matrix": {
            "mcq": [
                () => { 
                    let r1 = rand(2, 8), c1 = rand(2, 8), c2 = rand(2, 8);
                    while(c2 === c1 || c2 === r1) c2 = rand(2,8);
                    return { 
                        en: `If matrix $A$ is $${r1} \\times ${c1}$ and $B$ is $${c1} \\times ${c2}$, what is the order of $AB$?`, 
                        gu: `જો $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${c1} \\times ${c2}$ હોય, તો $AB$ ની કક્ષા:`, 
                        correct: `$${r1} \\times ${c2}$`, 
                        distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`], 
                        solEn: `<div class="step-container"><span class="step-title">Rule:</span> $(m \\times n) \\times (n \\times p) = m \\times p$. Here $(${r1} \\times ${c1}) \\times (${c1} \\times ${c2}) = ${r1} \\times ${c2}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">નિયમ:</span> શ્રેણિક ગુણાકારનો નિયમ.</div>` 
                    };
                },
                () => { 
                    let a = rand(1,9), b = rand(1,9), c = rand(1,9), d = rand(1,9);
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, find $A^T$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $A^T$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${a} & ${c} \\\\ ${b} & ${d} \\end{bmatrix}$`,
                        distractors: [`$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} -${a} & -${c} \\\\ -${b} & -${d} \\end{bmatrix}$`],
                        solEn: `<div class="step-container"><span class="step-title">Rule:</span> Transpose means converting rows into columns. Row 1 becomes Column 1.</div>`,
                        solGu: `<div class="step-container"><span class="step-title">નિયમ:</span> પરિવર્ત શ્રેણિક માટે હારને સ્તંભમાં ફેરવો.</div>`
                    };
                },
                () => { 
                    let a = rand(2, 9), b = rand(-6, 6), c = rand(-6, 6), d = rand(2, 9);
                    let det = (a*d) - (b*c);
                    return {
                        en: `Find the determinant $|A|$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો નિશ્ચાયક $|A|$ શોધો.`,
                        correct: `$${det}$`,
                        distractors: [`$${det+2}$`, `$${(a*c)-(b*d)}$`, `$${(a*d)+(b*c)}$`],
                        solEn: `<div class="step-container"><span class="step-title">Formula:</span> $|A| = ad - bc = (${a})(${d}) - (${b})(${c}) = ${det}$.</div>`,
                        solGu: `<div class="step-container"><span class="step-title">સૂત્ર:</span> નિશ્ચાયક $|A| = ad - bc = ${det}$.</div>`
                    };
                },
                () => { 
                    let x = rand(2, 15), y = rand(2, 15), c1 = rand(1,9);
                    return { 
                        en: `If $\\begin{bmatrix} x-1 \\\\ y+2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} \\\\ ${y+2} \\end{bmatrix}$, find $x+y+${c1}$.`, 
                        gu: `જો $\\begin{bmatrix} x-1 \\\\ y+2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} \\\\ ${y+2} \\end{bmatrix}$ હોય, તો $x+y+${c1}$ શોધો.`, 
                        correct: `$${x+y+c1}$`, distractors: [`$${x+y+c1+2}$`, `$${x-y+c1}$`, `$${x+y-1}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1:</span> Equate elements: $x-1=${x-1}\\implies x=${x}$. $y+2=${y+2}\\implies y=${y}$. Sum is ${x+y+c1}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> ઘટકો સરખાવો અને સરવાળો કરો.</div>` 
                    };
                },
                () => { 
                    let a = rand(-9, 9), b = rand(-9, 9), c = rand(-9, 9), d = rand(-9, 9);
                    return { 
                        en: `Find the adjoint of $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, 
                        gu: `$A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ નો adj(A) શોધો.`, 
                        correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-a} & ${-b} \\\\ ${-c} & ${-d} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Rule:</span> Swap main diagonal (${a}, ${d}), flip signs of off-diagonal (${b}, ${c}).</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">નિયમ:</span> મુખ્ય વિકર્ણ બદલો, અન્યના ચિહ્નો બદલો.</div>` 
                    };
                },
                () => { 
                    let k = rand(2, 9), a = rand(1, 9), d = rand(1, 9);
                    return { 
                        en: `If $A = \\begin{bmatrix} ${a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$, then $${k}A =$ ?`, 
                        gu: `જો $A = \\begin{bmatrix} ${a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$ હોય, તો $${k}A =$ ?`, 
                        correct: `$\\begin{bmatrix} ${k*a} & 0 \\\\ 0 & ${k*d} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${a+k} & 0 \\\\ 0 & ${d+k} \\end{bmatrix}$`, `$\\begin{bmatrix} ${k*a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a} & 0 \\\\ 0 & ${k*d} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1:</span> Multiply every element by ${k}.</div>`, solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> દરેક ઘટકને ${k}$ વડે ગુણો.</div>` 
                    };
                },
                () => { 
                    let n = rand(2,9);
                    return { 
                        en: `If $A$ is a $${n} \\times ${n}$ square matrix and $|A| = 0$, then $A$ is called:`, 
                        gu: `જો $${n} \\times ${n}$ ચોરસ શ્રેણિક $A$ માટે $|A| = 0$ હોય, તો $A$ ને શું કહેવાય?`, 
                        correct: `Singular Matrix`, distractors: [`Non-singular Matrix`, `Identity Matrix`, `Symmetric Matrix`], 
                        solEn: `<div class="step-container"><span class="step-title">Definition:</span> $|A| = 0$ means the matrix is Singular.</div>`, solGu: `<div class="step-container"><span class="step-title">વ્યાખ્યા:</span> અસામાન્ય શ્રેણિકની વ્યાખ્યા.</div>` 
                    };
                }
            ],
            "examples": [
                () => { 
                    let a1 = rand(1,5), a2 = rand(-2,2), a3 = rand(0,3), a4 = rand(1,5);
                    let b1 = rand(2,5), b2 = rand(-2,2), b3 = rand(1,3), b4 = rand(0,3);
                    let c1 = a1*b1+a2*b3, c2 = a1*b2+a2*b4, c3 = a3*b1+a4*b3, c4 = a3*b2+a4*b4;
                    return {
                        en: `If $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$, find $(AB)^T$.`,

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const summaryCard = document.getElementById('summary-card');
        const actionBtns = document.getElementById('action-buttons');
        
        form.innerHTML = '';
        summaryCard.style.display = 'none';
        currentQuizData = [];

        startTimer();

        const numQuestions = type === 'mcq' ? 20 : 15;
        const availableGenerators = generators[topic][type]; 

        let generatorIndex = 0;
        
        for (let i = 0; i < numQuestions; i++) {
            let qData;
            let options;
            let attempts = 0;
            let isDuplicate = true;
            // Safe loop to prevent infinite freezing
            while (isDuplicate && attempts < 500) {
                const genFunc = availableGenerators[(generatorIndex + attempts) % availableGenerators.length];
                qData = genFunc();
                
                let textExists = currentQuizData.some(existingQ => existingQ.en === qData.en);
                
                let rawOptions = [{text: qData.correct, isCorrect: true}];
                if (qData.distractors) {
                    qData.distractors.forEach(d => rawOptions.push({text: d, isCorrect: false}));
                }
                
                let uniqueOptionTexts = new Set(rawOptions.map(o => String(o.text).trim()));
                if (textExists || uniqueOptionTexts.size !== 4) {
                    isDuplicate = true;
                    attempts++;
                } else {
                    isDuplicate = false;
                    options = rawOptions;
                }
            }
            
            generatorIndex++;
            options = shuffle(options);
            qData.shuffledOptions = options;
            currentQuizData.push(qData);

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt, idx) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                input.id = `q${i}_opt${idx}`;
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                label.htmlFor = input.id;
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        actionBtns.style.display = 'flex';
        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        
        renderMath();
    }

    function gradeQuiz() {
        // --- NEW: Validate Student Details on Submit ---
        const nameInput = document.getElementById('studentName');
        const enrollInput = document.getElementById('enrollmentNo');
        const nameVal = nameInput.value.trim();
        const enrollVal = enrollInput.value.trim();

        if (!/^[A-Za-z\s]+$/.test(nameVal)) {
            alert("Please enter a valid Name (Only alphabets and spaces are allowed).\n(કૃપા કરીને માન્ય નામ દાખલ કરો.)");
            nameInput.focus();
            return;
        }
        if (!/^\d{12}$/.test(enrollVal)) {
            alert("Please enter a valid Enrollment No. (Exactly 12 digits are required).\n(કૃપા કરીને બરાબર 12 આંકડાનો એનરોલમેન્ટ નંબર દાખલ કરો.)");
            enrollInput.focus();
            return;
        }
        // -----------------------------------------------

        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        const timeTaken = stopTimer();
        document.getElementById('timer-display').style.display = 'none';

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        // --- NEW: Generate Timestamp & Lock Inputs ---
        const now = new Date();
        const timestampStr = now.toLocaleString('en-IN'); 
        document.getElementById('test-timestamp').innerText = timestampStr;
        document.getElementById('timestamp-group').style.display = 'flex';
        
        nameInput.disabled = true;
        enrollInput.disabled = true;
        // ---------------------------------------------

        const percentage = Math.round((score / currentQuizData.length) * 100);
        let feedbackMsg = "";
        let feedbackColor = "";
        
        if(percentage >= 80) { feedbackMsg = "Excellent Preparation! Keep it up. (ખૂબ સરસ તૈયારી!)"; feedbackColor = "#059669"; }
        else if(percentage >= 50) { feedbackMsg = "Good job, but keep practicing. (સારી મહેનત, વધુ પ્રેક્ટિસ કરો.)"; feedbackColor = "#d97706"; }
        else { feedbackMsg = "Needs more focus and practice. (વધુ ધ્યાન અને પ્રેક્ટિસ ની જરૂર છે.)"; feedbackColor = "#dc2626"; }

        const summaryCard = document.getElementById('summary-card');
        summaryCard.innerHTML = `
            <div class="summary-title">Test Completed!</div>
            <div class="summary-stats">
                Score: <strong>${score} / ${currentQuizData.length}</strong> (${percentage}%)<br>
                Time Taken: <strong>${timeTaken}</strong>
            </div>
            <div class="summary-msg" style="background-color: ${feedbackColor}; color: white;">${feedbackMsg}</div>
        `;
        summaryCard.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.style.display = 'none';

        renderMath();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
