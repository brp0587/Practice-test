    <style>
        :root { --primary: #0f172a; --secondary: #b91c1c; --bg-light: #f8fafc; --text-main: #1e293b; --text-muted: #475569; --accent: #0284c7; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #cbd5e1; color: var(--text-main); margin: 0; padding: 20px; padding-bottom: 100px; line-height: 1.6; }
        .container { max-width: 1100px; width: 100%; margin: auto; background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; }

        .gtu-table th { background-color: #f8fafc; color: var(--primary); font-weight: bold; }

        .options { list-style-type: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .options input[type="radio"] { margin-right: 12px; margin-top: 5px; transform: scale(1.3); flex-shrink: 0; }
        .options input[type="radio"]:checked + span { font-weight: bold; color: var(--accent); }
        .solution { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 1.05em; line-height: 1.6; border-top: 2px dashed #cbd5e1; overflow-x: auto; background: #f8fafc; border-left: 4px solid var(--accent); }
        .solution-correct { background-color: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; border-left-color: #059669; }
        .solution-incorrect { background-color: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; border-left-color: #dc2626;}
        #summary-card { display: none; text-align: center; margin-bottom: 30px; padding: 25px; background: #f0f9ff; color: #0369a1; border-radius: 12px; border: 2px solid #38bdf8; }

        .summary-msg { font-size: 1.1em; font-weight: bold; padding: 10px; border-radius: 6px; display: inline-block; }

        @media(max-width: 768px) { body { padding: 10px; padding-bottom: 110px; } .container { padding: 15px; } .options { grid-template-columns: 1fr; } .footer { flex-direction: column; text-align: center; gap: 8px; } }
        @media(min-width: 769px) { .action-buttons-container { flex-direction: row; } }
        @media print { body { background: #fff; padding: 0; color: #000; } .container { box-shadow: none; margin: 0; padding: 0; } .controls, .action-buttons-container, .footer, #timer-display { display: none !important; } .question-block { page-break-inside: avoid; border: 1px solid #ccc; box-shadow: none; } }

<script>
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; }

    let timerInterval; let secondsElapsed = 0;
    function startTimer() { clearInterval(timerInterval); secondsElapsed = 0; const td = document.getElementById('timer-display'); td.style.display = window.innerWidth > 768 ? 'block' : 'inline-block'; td.innerText = "⏱ 00:00"; timerInterval = setInterval(() => { secondsElapsed++; let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0'); let s = (secondsElapsed % 60).toString().padStart(2, '0'); td.innerText = `⏱ ${m}:${s}`; }, 1000); }
    function stopTimer() { clearInterval(timerInterval); let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0'); let s = (secondsElapsed % 60).toString().padStart(2, '0'); return `${m} minutes and ${s} seconds`; }
    function renderMath() { if (window.MathJax && window.MathJax.typesetPromise) { MathJax.typesetPromise().catch(err => console.error(err)); } else { setTimeout(renderMath, 150); } }

    /* EXACTLY 15 DISTINCT MCQs & 10 DISTINCT EXAMPLES PER TOPIC - NO REPETITION */
    const generators = {
        "matrix": {
            "mcq": [
                () => { let r1 = rand(2,5), c1 = rand(2,5), c2 = rand(2,5); return { en: `Order of $AB$ if $A$ is $${r1} \\times ${c1}$ and $B$ is $${c1} \\times ${c2}$?`, gu: `$A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની $${c1} \\times ${c2}$ હોય, તો $AB$ ની કક્ષા:`, correct: `$${r1} \\times ${c2}$`, distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`], sol: `Rule: $(m \\times n) \\times (n \\times p) = m \\times p$.`}; },
                () => { return { en: `If $A$ is a square matrix and $A^2 = A$, then $A$ is called:`, gu: `જો $A^2 = A$ હોય, તો $A$ ને શું કહેવાય?`, correct: `Idempotent`, distractors: [`Nilpotent`, `Involutory`, `Orthogonal`], sol: `Definition: An idempotent matrix yields itself when squared.`}; },
                () => { let a=rand(1,9), b=rand(1,9), c=rand(1,9), d=rand(1,9); return { en: `Find $A^T$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, gu: `$A^T$ શોધો.`, correct: `$\\begin{bmatrix} ${a} & ${c} \\\\ ${b} & ${d} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} -${a} & -${c} \\\\ -${b} & -${d} \\end{bmatrix}$`], sol: `Transpose converts rows to columns.`}; },
                () => { let a=rand(1,5), b=rand(1,5), c=rand(1,5), d=rand(1,5); let det = (a*d)-(b*c); return { en: `Find determinant of $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, gu: `નિશ્ચાયક શોધો.`, correct: `$${det}$`, distractors: [`$${det+2}$`, `$${-det}$`, `$${(a*c)-(b*d)}$`], sol: `Formula: $ad - bc$.`}; },
                () => { let a=rand(1,4), b=rand(1,4), c=rand(1,4), d=rand(1,4); return { en: `Adjoint of $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ is:`, gu: `$adj(A)$ શોધો.`, correct: `$\\begin{bmatrix} ${d} & -${b} \\\\ -${c} & ${a} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${a} & ${c} \\\\ ${b} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} -${a} & -${b} \\\\ -${c} & -${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`], sol: `Rule for 2x2 Adjoint: Swap diagonal elements, change signs of off-diagonal elements.`}; },
                () => { let x=rand(2,6), b=rand(2,5), c=rand(2,5); let d=(x*c)/b; if(!Number.isInteger(d)){x=b*2; d=(x*c)/b;} return { en: `If $\\begin{bmatrix} x & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ is singular, find $x$.`, gu: `શ્રેણિક અસામાન્ય હોય, તો $x$ શોધો.`, correct: `$${x}$`, distractors: [`$${x+2}$`, `$${-x}$`, `$${d}$`], sol: `Rule: $|A| = 0 \\implies x(${d}) - (${b})(${c}) = 0$.`}; },
                () => { let x=rand(2,5), y=rand(2,5); return { en: `If $\\begin{bmatrix} x+y & 3 \\\\ -7 & x-y \\end{bmatrix} = \\begin{bmatrix} ${x+y} & 3 \\\\ -7 & ${x-y} \\end{bmatrix}$, find $(x,y)$.`, gu: `$(x,y)$ શોધો.`, correct: `(${x}, ${y})`, distractors: [`(${y}, ${x})`, `(${x+1}, ${y})`, `(${x}, ${y-1})`], sol: `Solve equality: $x+y=${x+y}$ and $x-y=${x-y}$.`}; },
                () => { return { en: `If $AB = I$, then matrix $B = $`, gu: `જો $AB = I$, તો શ્રેણિક $B = $`, correct: `$A^{-1}$`, distractors: [`$A^T$`, `$adj(A)$`, `Identity Matrix`], sol: `Definition of Inverse Matrix.`}; },
                () => { return { en: `If $A = A^T$, the matrix is:`, gu: `જો $A = A^T$ હોય તો શ્રેણિક:`, correct: `Symmetric`, distractors: [`Skew-Symmetric`, `Identity`, `Singular`], sol: `Definition of Symmetric Matrix.`}; },
                () => { return { en: `If $A = -A^T$, the matrix is:`, gu: `જો $A = -A^T$ હોય તો શ્રેણિક:`, correct: `Skew-Symmetric`, distractors: [`Symmetric`, `Identity`, `Singular`], sol: `Definition of Skew-Symmetric Matrix.`}; },
                () => { let a=rand(1,3), b=rand(1,3); return { en: `If $A=[${a}]$ and $B=[${b}]$, then $AB=$`, gu: `જો $A=[${a}]$ અને $B=[${b}]$ હોય તો $AB=$`, correct: `$[${a*b}]$`, distractors: [`${a*b}`, `$[${a+b}]$`, `Not possible`], sol: `1x1 Matrix multiplication.`}; },
                () => { let r=rand(3,5), c=rand(2,4); return { en: `Order of matrix with ${r} rows and ${c} columns is:`, gu: `${r} હાર અને ${c} સ્તંભ વાળા શ્રેણિકની કક્ષા:`, correct: `$${r} \\times ${c}$`, distractors: [`$${c} \\times ${r}$`, `$${r+c}$`, `$${r*c}$`], sol: `Order is Rows $\\times$ Columns.`}; },
                () => { let a=rand(1,3), b=rand(1,3), c=rand(1,3), d=rand(1,3), k=rand(2,4); return { en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, find $${k}A$.`, gu: `$${k}A$ શોધો.`, correct: `$\\begin{bmatrix} ${k*a} & ${k*b} \\\\ ${k*c} & ${k*d} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${a} & ${k*b} \\\\ ${c} & ${k*d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a+k} & ${b+k} \\\\ ${c+k} & ${d+k} \\end{bmatrix}$`, `$\\begin{bmatrix} ${k*a} & ${b} \\\\ ${k*c} & ${d} \\end{bmatrix}$`], sol: `Scalar multiplication: multiply every element by ${k}.`}; },
                () => { let a=rand(1,3); return { en: `If $A = \\begin{bmatrix} ${a} & 0 \\\\ 0 & ${a} \\end{bmatrix}$, then $A$ is a:`, gu: `આ શ્રેણિક કયા પ્રકારનો છે?`, correct: `Scalar Matrix`, distractors: [`Identity Matrix`, `Row Matrix`, `Singular Matrix`], sol: `Diagonal elements are same and non-diagonal are 0.`}; },
                () => { let a=rand(1,5), b=rand(1,5), c=rand(1,5); return { en: `If $[${a} \\quad x \\quad -2] \\begin{bmatrix} 1 \\\\ 2 \\\\ 3 \\end{bmatrix} = [${c}]$, find $x$.`, gu: `x શોધો.`, correct: `$${(c - a + 6)/2}$`, distractors: [`$${c}$`, `$${a+c}$`, `$0$`], sol: `Multiply: ${a}(1) + x(2) + (-2)(3) = ${c}$.`}; }
            ],
            "examples": [
                () => { let a=rand(1,4), b=rand(1,4), c=rand(1,4), d=rand(1,4), e=rand(1,3), f=rand(1,3), g=rand(1,3), h=rand(1,3); let v1=(a*e)+(b*g), v2=(a*f)+(b*h), v3=(c*e)+(d*g), v4=(c*f)+(d*h); return { en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, $B = \\begin{bmatrix} ${e} & ${f} \\\\ ${g} & ${h} \\end{bmatrix}$, find $(AB)^T$.`, gu: `$(AB)^T$ શોધો.`, correct: `$\\begin{bmatrix} ${v1} & ${v3} \\\\ ${v2} & ${v4} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${v1} & ${v2} \\\\ ${v3} & ${v4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${v4} & ${v2} \\\\ ${v3} & ${v1} \\end{bmatrix}$`, `$\\begin{bmatrix} ${v2} & ${v4} \\\\ ${v1} & ${v3} \\end{bmatrix}$`], sol: `Steps: Find $AB$ using Row $\\times$ Col. Then transpose.` }; },
                () => { let a=rand(2,4), b=rand(1,3), c=rand(1,5), d=rand(2,4), x=rand(1,4), y=rand(1,4); let e1=a*x+b*y, e2=c*x-d*y; return { en: `Solve using matrix method: $${a}x+${b}y=${e1}$ and $${c}x-${d}y=${e2}$.`, gu: `શ્રેણિકની મદદથી ઉકેલો.`, correct: `$x=${x}, y=${y}$`, distractors: [`$x=${y}, y=${x}$`, `$x=${x+1}, y=${y}$`, `$x=-${x}, y=${y}$`], sol: `Steps: $AX=B \\implies X = A^{-1}B$. Find $|A|$ and $adj(A)$.` }; },
                () => { let a=rand(1,3), b=rand(1,2), c=rand(1,2), d=rand(1,3), k=rand(2,4); let r1=(a*a+b*c)-k*a, r2=(a*b+b*d)-k*b, r3=(c*a+d*c)-k*c, r4=(c*b+d*d)-k*d; return { en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, find $A^2 - ${k}A$.`, gu: `$A^2 - ${k}A$ શોધો.`, correct: `$\\begin{bmatrix} ${r1} & ${r2} \\\\ ${r3} & ${r4} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${r1+1} & ${r2} \\\\ ${r3} & ${r4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${r4} & ${r3} \\\\ ${r2} & ${r1} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a*a} & ${b*b} \\\\ ${c*c} & ${d*d} \\end{bmatrix}$`], sol: `Steps: Compute $A^2 = A \\times A$. Multiply $A$ by ${k}$. Subtract corresponding elements.`}; },
                () => { let a=rand(1,2), b=rand(1,2), c=rand(2,3), d=rand(1,2); let det = a*d-b*c; if(det===0){d++; det=a*d-b*c;} return { en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, show that $A \\cdot A^{-1} = I$ and find $A^{-1}$.`, gu: `$A^{-1}$ શોધો.`, correct: `$\\frac{1}{${det}}\\begin{bmatrix} ${d} & -${b} \\\\ -${c} & ${a} \\end{bmatrix}$`, distractors: [`$\\frac{1}{${det}}\\begin{bmatrix} ${a} & ${c} \\\\ ${b} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & -${b} \\\\ -${c} & ${a} \\end{bmatrix}$`, `$\\frac{1}{${det+1}}\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`], sol: `Steps: Find $|A|=${det}$. Find $adj(A)$. $A^{-1} = adj(A)/|A|$. Multiply $A \\times A^{-1}$ to prove it equals $I$.`}; },

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const summaryCard = document.getElementById('summary-card');
        const actionBtns = document.getElementById('action-buttons');
        
        form.innerHTML = '';
        summaryCard.style.display = 'none';
        currentQuizData = [];

        startTimer();

        let targetCount = type === 'mcq' ? 15 : 10;
        
        let availableGenerators = [...generators[topic][type]];
        availableGenerators = shuffle(availableGenerators);

        for(let i=0; i<targetCount; i++) {
            if(i >= availableGenerators.length) break; 
            
            let qData = availableGenerators[i](); 
            
            let rawOptions = [{text: qData.correct, isCorrect: true}];
            if (qData.distractors) { qData.distractors.forEach(d => rawOptions.push({text: d, isCorrect: false})); }
            
            let options = shuffle(rawOptions);
            qData.shuffledOptions = options;
            currentQuizData.push(qData);
            
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            qBlock.innerHTML = `
                <div class="question-text">
                    <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                    <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
                </div>
            `;

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <label for="q${i}_opt${idx}">
                        <input type="radio" name="q${i}" value="${opt.isCorrect ? 'correct' : 'incorrect'}" id="q${i}_opt${idx}">
                        <span>${opt.text}</span>
                    </label>
                `;
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }
        
        actionBtns.style.display = 'flex';
        submitBtn.style.display = 'block'; submitBtn.disabled = false;
        renderMath();
    }

    function gradeQuiz() {
        const nameInput = document.getElementById('studentName');
        const enrollInput = document.getElementById('enrollmentNo');
        if (!/^[A-Za-z\s]+$/.test(nameInput.value.trim())) { alert("Please enter a valid Name (Alphabets only)."); nameInput.focus(); return; }
        if (!/^\d{12}$/.test(enrollInput.value.trim())) { alert("Please enter exactly 12 digits for Enrollment No."); enrollInput.focus(); return; }

        let score = 0, answeredAll = true;
        currentQuizData.forEach((_, i) => { if (!document.querySelector(`input[name="q${i}"]:checked`)) answeredAll = false; });
        if (!answeredAll) { alert("Please answer all questions before submitting."); return; }

        const timeTaken = stopTimer();
        document.getElementById('timer-display').style.display = 'none';
        
        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct!</strong><br><br><strong>Solution / Hint:</strong><br>${qData.sol}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect.</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Solution / Hint:</strong><br>${qData.sol}`;
            }
            solutionDiv.style.display = 'block';
            document.querySelectorAll(`input[name="q${i}"]`).forEach(input => input.disabled = true);
        });

        document.getElementById('test-timestamp').innerText = new Date().toLocaleString('en-IN'); 
        document.getElementById('timestamp-group').style.display = 'flex';
        nameInput.disabled = true; enrollInput.disabled = true;

        const percentage = Math.round((score / currentQuizData.length) * 100);
        let feedbackMsg = percentage >= 80 ? "Excellent Preparation!" : percentage >= 50 ? "Good job, but keep practicing." : "Needs more focus and practice.";
        let feedbackColor = percentage >= 80 ? "#059669" : percentage >= 50 ? "#d97706" : "#dc2626";

        const summaryCard = document.getElementById('summary-card');
        summaryCard.innerHTML = `<div class="summary-title">Test Completed!</div><div class="summary-stats">Score: <strong>${score} / ${currentQuizData.length}</strong> (${percentage}%)<br>Time Taken: <strong>${timeTaken}</strong></div><div class="summary-msg" style="background-color: ${feedbackColor}; color: white;">${feedbackMsg}</div>`;
        summaryCard.style.display = 'block';

        document.getElementById('submit-btn').style.display = 'none';
        renderMath(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }
