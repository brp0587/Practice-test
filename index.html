<script>
    // Utility Math & Array Functions
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Timer Logic
    let timerInterval;
    let secondsElapsed = 0;
    function startTimer() {
        clearInterval(timerInterval);
        secondsElapsed = 0;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.style.display = 'block';
        timerDisplay.innerText = "⏱ 00:00";
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            let s = (secondsElapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `⏱ ${m}:${s}`;
        }, 1000);
    }
    function stopTimer() {
        clearInterval(timerInterval);
        let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let s = (secondsElapsed % 60).toString().padStart(2, '0');
        return `${m} minutes and ${s} seconds`;
    }

    // MEGA-GENERATORS: Guaranteed 100% Syllabus Coverage via Dynamic Arrays
    const generators = {
        "matrix": {
            "mcq": [
                () => { 
                    let r1 = rand(2, 4), c1 = rand(2, 4), c2 = rand(2, 4); 
                    while(c2 === c1 || c2 === r1) c2 = rand(2,4);
                    return { 
                        en: `If matrix $A$ is $${r1} \\times ${c1}$ and $B$ is $${c1} \\times ${c2}$, what is the order of $AB$?`, 
                        gu: `જો $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${c1} \\times ${c2}$ હોય, તો $AB$ ની કક્ષા:`, 
                        correct: `$${r1} \\times ${c2}$`, 
                        distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`], 
                        solEn: `<div class="step-container"><span class="step-title">Rule:</span> $(m \\times n) \\times (n \\times p) = m \\times p$. Here $(${r1} \\times ${c1}) \\times (${c1} \\times ${c2}) = ${r1} \\times ${c2}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">નિયમ:</span> શ્રેણિક ગુણાકારનો નિયમ.</div>` 
                    }; 
                },
                () => { 
                    let terms = ["Singular Matrix", "Symmetric Matrix", "Skew-Symmetric Matrix", "Identity Matrix", "Orthogonal Matrix"];
                    let selected = rand(0, 4);
                    let qEn, qGu, corr, dist;
                    if(selected===0){ qEn=`If $|A| = 0$, $A$ is called:`; qGu=`જો $|A| = 0$ હોય, તો $A$:`; corr=`Singular`; dist=[`Non-singular`,`Identity`,`Symmetric`]; }
                    else if(selected===1){ qEn=`If $A^T = A$, $A$ is called:`; qGu=`જો $A^T = A$ હોય, તો $A$:`; corr=`Symmetric`; dist=[`Skew-Symmetric`,`Identity`,`Singular`]; }
                    else if(selected===2){ qEn=`If $A^T = -A$, $A$ is called:`; qGu=`જો $A^T = -A$ હોય, તો $A$:`; corr=`Skew-Symmetric`; dist=[`Symmetric`,`Identity`,`Singular`]; }
                    else if(selected===3){ qEn=`If $A \\cdot A^{-1} = I$, what is $I$?`; qGu=`જો $A \\cdot A^{-1} = I$ હોય, તો $I$:`; corr=`Identity Matrix`; dist=[`Zero Matrix`,`Symmetric`,`Adjoint Matrix`]; }
                    else { qEn=`If $A \\cdot A^T = I$, $A$ is called:`; qGu=`જો $A \\cdot A^T = I$ હોય, તો $A$:`; corr=`Orthogonal`; dist=[`Symmetric`,`Skew-Symmetric`,`Singular`]; }
                    return { en: qEn, gu: qGu, correct: corr, distractors: dist, solEn: `<div class="step-container"><span class="step-title">Definition:</span> Standard matrix property.</div>`, solGu: `<div class="step-container"><span class="step-title">વ્યાખ્યા:</span> શ્રેણિકનો ગુણધર્મ.</div>` }; 
                },
                () => { 
                    let props = ["(AB)^T = B^T A^T", "(A+B)^T = A^T + B^T", "(kA)^T = kA^T", "(A^T)^T = A"];
                    let corr = props[rand(0,3)];
                    let dist = ["(AB)^T = A^T B^T", "(AB)^T = A^{-1} B^{-1}", "(A+B)^T = A^T B^T", "(A^T)^T = A^{-1}"];
                    dist = dist.filter(d => d !== corr).slice(0,3);
                    return { 
                        en: `Which of the following properties of transpose is correct?`, 
                        gu: `પરિવર્ત શ્રેણિક માટે નીચેનામાંથી શું સાચું છે?`, 
                        correct: `$${corr}$`, distractors: dist.map(d=>`$${d}$`), 
                        solEn: `<div class="step-container">Standard reversal/linear laws of transposes.</div>`, solGu: `<div class="step-container">પરિવર્ત શ્રેણિકના નિયમ મુજબ.</div>` 
                    }; 
                },
                () => { 
                    let a = rand(-5, 5), b = rand(-5, 5), c = rand(-5, 5), d = rand(-5, 5); 
                    return { 
                        en: `Find the adjoint of $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, 
                        gu: `$A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ નો adj(A) શોધો.`, 
                        correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-a} & ${-b} \\\\ ${-c} & ${-d} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Rule:</span> Swap main diagonal (${a}, ${d}), flip signs of off-diagonal (${b}, ${c}).</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">નિયમ:</span> મુખ્ય વિકર્ણ બદલો, અન્યના ચિહ્નો બદલો.</div>` 
                    }; 
                },
                () => { 
                    let x = rand(2, 6), y = rand(1, 5), c1 = rand(1,5); 
                    return { 
                        en: `If $\\begin{bmatrix} x-1 \\\\ y+2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} \\\\ ${y+2} \\end{bmatrix}$, find $x+y+${c1}$.`, 
                        gu: `જો $\\begin{bmatrix} x-1 \\\\ y+2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} \\\\ ${y+2} \\end{bmatrix}$ હોય, તો $x+y+${c1}$ શોધો.`, 
                        correct: `$${x+y+c1}$`, distractors: [`$${x+y+c1+2}$`, `$${x-y+c1}$`, `$${x+y-1}$`], 
                        solEn: `<div class="step-container">Equate elements: $x-1=${x-1}\\implies x=${x}$. $y+2=${y+2}\\implies y=${y}$. Sum is ${x+y+c1}.</div>`, 
                        solGu: `<div class="step-container">ઘટકો સરખાવો અને સરવાળો કરો.</div>` 
                    }; 
                }
            ],
            "examples": [
                () => { 
                    let a = rand(1, 3), b = rand(1, 3), c = rand(2, 4), d = rand(4, 6); 
                    let det = (a*d) - (b*c); 
                    if(det === 0) { d++; det = (a*d) - (b*c); } 
                    return { 
                        en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, 
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`, 
                        correct: `$\\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\frac{1}{${det}}\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\frac{1}{${det+1}}\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Determinant</span><br>$|A| = (${a})(${d}) - (${b})(${c}) = ${det}$.</div><div class="step-container"><span class="step-title">Step 2: Formula</span><br>$A^{-1} = \\frac{1}{|A|} \\text{adj}(A) = \\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: નિશ્ચાયક</span><br>$|A| = ${det}$. $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ વાપરો.</div>` 
                    }; 
                },
                () => { 
                    let x = rand(1, 4);
                    return { 
                        en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & ${x} \\end{bmatrix}$.`, 
                        gu: `જો $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & ${x} \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`, 
                        correct: `Use $\\frac{1}{|A|} \\text{adj}(A)$ algorithm`, 
                        distractors: [`$\\frac{1}{|A|} A^T$`, `$\\text{adj}(A)$`, `Zero Matrix`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Determinant</span><br>$|A| = 3(1 \\cdot ${x} - 0) - (-1)(4 \\cdot ${x} - (-5)) + 2(0 - 5)$.</div><div class="step-container"><span class="step-title">Step 2: Cofactors & Adjoint</span><br>Find the 9 cofactors, form the matrix, transpose it to get $\\text{adj}(A)$. Multiply by $1/|A|$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: નિશ્ચાયક</span><br>પ્રથમ નિશ્ચાયક |A| શોધો. પછી સહઅવયવજ શ્રેણિક શોધીને $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ સૂત્ર વાપરો.</div>` 
                    }; 
                },
                () => { 
                    let a1 = rand(1,3), a2 = rand(-2,2), a3 = rand(0,4), a4 = rand(1,3); 
                    let b1 = rand(2,4), b2 = rand(1,3), b3 = rand(-1,3), b4 = rand(2,5); 
                    let m = rand(2,4), n = rand(2,4);
                    return { 
                        en: `Find matrix $X$ if $${m}A + X = ${n}B$, where $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$.`, 
                        gu: `જો સમીકરણ $${m}A + X = ${n}B$ હોય, તો શ્રેણિક $X$ શોધો.`, 
                        correct: `$\\begin{bmatrix} ${n*b1 - m*a1} & ${n*b2 - m*a2} \\\\ ${n*b3 - m*a3} & ${n*b4 - m*a4} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${m*a1 + n*b1} & ${m*a2 + n*b2} \\\\ ${m*a3 + n*b3} & ${m*a4 + n*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${b1 - a1} & ${b2 - a2} \\\\ ${b3 - a3} & ${b4 - a4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${n*b1 + m*a1} & ${n*b2 + m*a2} \\\\ ${n*b3 + m*a3} & ${n*b4 + m*a4} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Rearrange</span><br>Isolate X: $X = ${n}B - ${m}A$.</div><div class="step-container"><span class="step-title">Step 2: Subtraction</span><br>Compute $${n}B$ and subtract $${m}A$ element by element. e.g., $X_{11} = ${n}(${b1}) - ${m}(${a1}) = ${n*b1 - m*a1}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: સમીકરણ ગોઠવો</span><br>$X = ${n}B - ${m}A$ બનાવો. ગુણાકાર કરી બાદબાકી કરો.</div>` 
                    }; 
                },
                () => { 
                    let a1=rand(1,2), a2=rand(0,2), a3=rand(-1,1), a4=rand(1,3); 
                    let b1=rand(2,3), b2=rand(-1,1), b3=rand(1,2), b4=rand(0,2);

                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> પ્રથમ મધ્યક 6 શોધો. પછી વિચલનોનો સરવાળો 12 મેળવી, સરેરાશ વિચલન 12/5 = 2.4 ગણો.</div>` 
                    }; 
                },
                () => { 
                    let f1 = rand(2, 4), f2 = rand(3, 5), f3 = rand(1, 3); 
                    let totalF = f1 + f2 + f3; let totalFX = (5*f1) + (15*f2) + (25*f3); let mean = (totalFX / totalF).toFixed(2); 
                    return { 
                        en: `Calculate mean for classes (0-10, 10-20, 20-30) with frequencies (${f1}, ${f2}, ${f3}) respectively.`, 
                        gu: `વર્ગો (0-10, 10-20, 20-30) અને આવૃત્તિ (${f1}, ${f2}, ${f3}) માટે મધ્યક ગણો.`, 
                        correct: `$${mean}$`, distractors: [`$${(totalFX/(totalF+1)).toFixed(2)}$`, `$15$`, `$${(totalFX/3).toFixed(2)}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Class Marks</span><br>$x_i$ are 5, 15, 25. Mean $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i} = \\frac{${totalFX}}{${totalF}} = ${mean}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> મધ્યકિંમત $x_i$ શોધીને $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i}$ સૂત્ર વાપરો.</div>` 
                    }; 
                }
            ]
        }
    };

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const summaryCard = document.getElementById('summary-card');
        const actionBtns = document.getElementById('action-buttons');
        
        form.innerHTML = '';
        summaryCard.style.display = 'none';
        currentQuizData = [];

        startTimer();

        const numQuestions = type === 'mcq' ? 20 : 15; 
        const availableGenerators = generators[topic][type]; 

        let generatorIndex = 0;
        
        for (let i = 0; i < numQuestions; i++) {
            let qData;
            let options;
            let attempts = 0;
            let isDuplicate = true;

            // STRICT ANTI-DUPLICATION ENGINE
            while (isDuplicate && attempts < 500) {
                const genFunc = availableGenerators[(generatorIndex + attempts) % availableGenerators.length];
                qData = genFunc();
                
                // 1. Text Uniqueness
                let textExists = currentQuizData.some(existingQ => existingQ.en === qData.en);
                
                // 2. Options Uniqueness
                let rawOptions = [{text: qData.correct, isCorrect: true}];
                qData.distractors.forEach(d => rawOptions.push({text: d, isCorrect: false}));
                let uniqueOptionTexts = new Set(rawOptions.map(o => String(o.text).trim()));
                
                if (textExists || uniqueOptionTexts.size < 4) {
                    isDuplicate = true;
                    attempts++;
                } else {
                    isDuplicate = false;
                    options = rawOptions;
                }
            }
            
            generatorIndex++;
            options = shuffle(options);
            qData.shuffledOptions = options;
            currentQuizData.push(qData);

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        actionBtns.style.display = 'flex';
        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        
        MathJax.typesetPromise([form]);
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        const timeTaken = stopTimer();
        document.getElementById('timer-display').style.display = 'none';

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Detailed Solution:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Detailed Solution:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        const percentage = Math.round((score / currentQuizData.length) * 100);
        let feedbackMsg = "";
        let feedbackColor = "";
        
        if(percentage >= 80) { feedbackMsg = "Excellent Preparation! Keep it up. (ખૂબ સરસ તૈયારી!)"; feedbackColor = "#059669"; }
        else if(percentage >= 50) { feedbackMsg = "Good job, but keep practicing. (સારી મહેનત, વધુ પ્રેક્ટિસ કરો.)"; feedbackColor = "#d97706"; }
        else { feedbackMsg = "Needs more focus and practice. (વધુ ધ્યાન અને પ્રેક્ટિસ ની જરૂર છે.)"; feedbackColor = "#dc2626"; }

        const summaryCard = document.getElementById('summary-card');
        summaryCard.innerHTML = `
            <div class="summary-title">Test Completed!</div>
            <div class="summary-stats">
                Score: <strong>${score} / ${currentQuizData.length}</strong> (${percentage}%)<br>
                Time Taken: <strong>${timeTaken}</strong>
            </div>
            <div class="summary-msg" style="background-color: ${feedbackColor}; color: white;">${feedbackMsg}</div>
        `;
        summaryCard.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.style.display = 'none';

        MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
