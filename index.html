<head>

    <title>GTU Mathematics: Complete Syllabus Practice Bank</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #b91c1c;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #0284c7;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: 80px; 
            line-height: 1.6;
        }
        .container {
            max-width: 1050px;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        
        #timer-display {
            display: none;
            position: absolute;
            top: 25px;
            right: 35px;
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #cbd5e1;
        }
        .control-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label.control-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 1.1em;
        }
        select, button {
            padding: 12px;
            font-size: 1.05em;
            border-radius: 6px;
            border: 1px solid #94a3b8;
        }
        button.primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            margin-top: auto;
        }
        button.primary-btn:hover { background: #0369a1; transform: translateY(-2px); }
        button.primary-btn:active { transform: translateY(0); }

        button.action-btn {
            background: #059669;
            color: white;
            border: none;
            font-size: 1.3em;
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button.action-btn:hover { background: #047857; }
        
        button.print-btn { background: #475569; }
        button.print-btn:hover { background: #334155; }
        
        .action-buttons-container {
            display: none;
            gap: 15px;
            margin-top: 30px;
        }
        
        .question-block {
            margin-bottom: 35px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            border-left: 6px solid var(--accent);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .bilingual-en { font-weight: 600; color: #0f172a; }
        .bilingual-gu { color: var(--text-muted); font-size: 0.95em; margin-top: 8px; margin-bottom: 15px; }
        
        .options {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media(max-width: 700px) { .options { grid-template-columns: 1fr; } }
        
        .options label {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1em;
        }
        .options label:hover { background: #e0f2fe; border-color: #7dd3fc; }
        .options input[type="radio"] { margin-right: 15px; transform: scale(1.4); }
        .options input[type="radio"]:checked + span { font-weight: bold; color: var(--accent); }
        
        .solution {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 1.05em;
            line-height: 1.8;
            border-top: 2px dashed #cbd5e1;
        }
        .solution-correct { background-color: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
        .solution-incorrect { background-color: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
        .step-title { font-weight: bold; color: var(--primary); margin-top: 8px; display: inline-block; }

        #summary-card {
            display: none;
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: #f0f9ff;
            color: #0369a1;
            border-radius: 12px;
            border: 2px solid #38bdf8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .summary-title { font-size: 2em; font-weight: bold; margin-bottom: 10px; }
        .summary-stats { font-size: 1.3em; margin-bottom: 15px; }
        .summary-msg { font-size: 1.2em; font-weight: bold; padding: 10px; border-radius: 6px; display: inline-block; }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            font-size: 0.95em;
            z-index: 1000;
        }
        .footer .visitor-counter { display: flex; align-items: center; gap: 10px; }

        @media print {
            body { background: #fff; padding: 0; color: #000; }
            .container { box-shadow: none; max-width: 100%; margin: 0; padding: 0; }
            .controls, .action-buttons-container, .footer, #timer-display { display: none !important; }
            .question-block { page-break-inside: avoid; border: 1px solid #ccc; box-shadow: none; }
            .options label { border: 1px solid #ccc; background: #fff; }
            #summary-card { border: 1px solid #ccc; background: #fff; color: #000; }
        }
    </style>
</head>

<script>
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let timerInterval;
    let secondsElapsed = 0;
    function startTimer() {
        clearInterval(timerInterval);
        secondsElapsed = 0;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.style.display = 'block';
        timerDisplay.innerText = "⏱ 00:00";
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            let s = (secondsElapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `⏱ ${m}:${s}`;
        }, 1000);
    }
    function stopTimer() {
        clearInterval(timerInterval);
        let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let s = (secondsElapsed % 60).toString().padStart(2, '0');
        return `${m} minutes and ${s} seconds`;
    }

    // MEGA-GENERATORS: Dynamically covering ALL GTU syllabus elements and past paper methods.
    const generators = {
        "matrix": {
            "mcq": [
                () => { // Order of Multiplication
                    let r1 = rand(1, 4), c1 = rand(2, 4), r2 = c1, c2 = rand(1, 4);
                    return {
                        en: `If matrix $A$ is $${r1} \\times ${c1}$ and $B$ is $${r2} \\times ${c2}$, what is the order of $AB$?`,
                        gu: `જો $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${r2} \\times ${c2}$ હોય, તો $AB$ ની કક્ષા:`,
                        correct: `$${r1} \\times ${c2}$`, distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`],
                        solEn: `Rule: $(m \\times n) \\times (n \\times p) = m \\times p$.`, solGu: `શ્રેણિક ગુણાકારનો નિયમ.`
                    };
                },
                () => { // Singular Matrix Concept
                    let a = rand(2, 5), b = rand(2, 5), c = rand(2, 5);
                    let x = (b*c)/a;
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & x \\end{bmatrix}$ is a singular matrix, find $x$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & x \\end{bmatrix}$ અસામાન્ય શ્રેણિક હોય, તો $x$ શોધો.`,
                        correct: `$${x}$`, distractors: [`$${x+1}$`, `$${-x}$`, `$0$`],
                        solEn: `For singular matrix, $|A| = 0 \\implies ${a}x - ${b*c} = 0$.`, solGu: `અસામાન્ય શ્રેણિક માટે નિશ્ચાયક $|A| = 0$ થાય.`
                    };
                },
                () => { // Transpose Properties
                    return {
                        en: `Which of the following is true for transpose of matrices $A$ and $B$?`,
                        gu: `શ્રેણિક $A$ અને $B$ ના પરિવર્ત માટે નીચેનામાંથી શું સાચું છે?`,
                        correct: `$(AB)^T = B^T A^T$`, distractors: [`$(AB)^T = A^T B^T$`, `$(A+B)^T = A^T B^T$`, `$(AB)^T = A^{-1} B^{-1}$`],
                        solEn: `Reversal law of transposes.`, solGu: `પરિવર્ત શ્રેણિકના નિયમ મુજબ.`
                    };
                },
                () => { // Symmetric/Skew-Symmetric
                    return {
                        en: `If a square matrix $A$ satisfies $A^T = -A$, then $A$ is called a:`,
                        gu: `જો ચોરસ શ્રેણિક $A$ માટે $A^T = -A$ હોય, તો $A$ ને શું કહેવાય?`,
                        correct: `Skew-Symmetric Matrix`, distractors: [`Symmetric Matrix`, `Identity Matrix`, `Singular Matrix`],
                        solEn: `Definition of Skew-Symmetric matrix.`, solGu: `વિસંમિત શ્રેણિકની વ્યાખ્યા.`
                    };
                },
                () => { // 2x2 Adjoint
                    let a = rand(-5, 5), b = rand(-5, 5), c = rand(-5, 5), d = rand(-5, 5);
                    return {
                        en: `Find the adjoint of $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`,
                        gu: `$A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ નો સહઅવયવજ શ્રેણિક (adj A) શોધો.`,
                        correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-a} & ${-b} \\\\ ${-c} & ${-d} \\end{bmatrix}$`],
                        solEn: `Swap main diagonal, flip signs of off-diagonal.`, solGu: `મુખ્ય વિકર્ણ બદલો, અન્યના ચિહ્નો બદલો.`
                    };
                }
            ],
            "examples": [
                () => { // 1. 2x2 Inverse
                    let a = rand(1, 3), b = rand(1, 3), c = rand(2, 4), d = rand(4, 6);
                    let det = (a*d) - (b*c);
                    if(det === 0) { d++; det = (a*d) - (b*c); }
                    return {
                        en: `Find $A^{-1}$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $A^{-1}$ શોધો.`,
                        correct: `$\\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\frac{1}{${det}}\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\frac{1}{${det+1}}\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`],
                        solEn: `Determinant $|A| = ${det}$. $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$.`, solGu: `નિશ્ચાયક $|A| = ${det}$. $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ વાપરો.`
                    };
                },
                () => { // 2. 3x3 Inverse
                    return {
                        en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & 1 \\end{bmatrix}$.`,
                        gu: `જો $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & 1 \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`,
                        correct: `$\\frac{1}{2}\\begin{bmatrix} 1 & 1 & -1 \\\\ -9 & -7 & 11 \\\\ -5 & -5 & 7 \\end{bmatrix}$`, 
                        distractors: [`$\\frac{1}{-2}\\begin{bmatrix} 1 & 1 & -1 \\\\ 9 & 7 & 11 \\\\ 5 & 5 & 7 \\end{bmatrix}$`, `$\\begin{bmatrix} 1 & 1 & -1 \\\\ -9 & -7 & 11 \\\\ -5 & -5 & 7 \\end{bmatrix}$`, `$\\frac{1}{4}\\begin{bmatrix} 1 & 2 & 1 \\\\ -9 & -7 & 11 \\\\ -5 & -5 & 7 \\end{bmatrix}$`],
                        solEn: `<span class="step-title">Step 1:</span> Find $|A| = 3(1) -(-1)(9) + 2(-5) = 2$.<br><span class="step-title">Step 2:</span> Find Cofactors and Adjoint matrix.<br><span class="step-title">Step 3:</span> $A^{-1} = \\frac{1}{2} \\text{adj}(A)$.`, 
                        solGu: `પ્રથમ નિશ્ચાયક |A| = 2 શોધો. પછી સહઅવયવજ શ્રેણિક શોધીને $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ સૂત્ર વાપરો.`
                    };
                },
                () => { // 3. Matrix Eq 2A + X = 3B
                    let a1 = rand(1,3), a2 = rand(-2,2), a3 = rand(0,4), a4 = rand(1,3);
                    let b1 = rand(2,4), b2 = rand(1,3), b3 = rand(-1,3), b4 = rand(2,5);
                    return {
                        en: `Find matrix $X$ if $2A + X = 3B$, where $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$.`,
                        gu: `જો સમીકરણ $2A + X = 3B$ હોય, તો શ્રેણિક $X$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${3*b1 - 2*a1} & ${3*b2 - 2*a2} \\\\ ${3*b3 - 2*a3} & ${3*b4 - 2*a4} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${2*a1 + 3*b1} & ${2*a2 + 3*b2} \\\\ ${2*a3 + 3*b3} & ${2*a4 + 3*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${b1 - a1} & ${b2 - a2} \\\\ ${b3 - a3} & ${b4 - a4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${3*b1 - a1} & ${3*b2 - a2} \\\\ ${3*b3 - a3} & ${3*b4 - a4} \\end{bmatrix}$`],
                        solEn: `Rearrange to $X = 3B - 2A$. Compute $3B$ and subtract $2A$ element by element.`, solGu: `સમીકરણ $X = 3B - 2A$ બનાવો. 3B ની ગણતરી કરો અને તેમાંથી 2A બાદ કરો.`
                    };
                },
                () => { // 4. Matrix Multiplication AB
                    let a1=rand(1,2), a2=rand(0,2), a3=rand(-1,1), a4=rand(1,3);
                    let b1=rand(2,3), b2=rand(-1,1), b3=rand(1,2), b4=rand(0,2);
                    let c1 = a1*b1+a2*b3, c2 = a1*b2+a2*b4, c3 = a3*b1+a4*b3, c4 = a3*b2+a4*b4;
                    return {
                        en: `If $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$, find $AB$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ અને $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$ હોય, તો $AB$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${c1} & ${c2} \\\\ ${c3} & ${c4} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${c1+1} & ${c2} \\\\ ${c3} & ${c4-1} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a1*b1} & ${a2*b2} \\\\ ${a3*b3} & ${a4*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${c4} & ${c3} \\\\ ${c2} & ${c1} \\end{bmatrix}$`],
                        solEn: `Multiply rows of A with columns of B. $C_{11} = (${a1})(${b1}) + (${a2})(${b3}) = ${c1}$.`, solGu: `A ની હાર અને B ના સ્તંભનો ગુણાકાર કરો.`
                    };
                },
                () => { // 5. Linear Eq 2 variables
                    let x = rand(1, 3), y = rand(1, 3);
                    let a = rand(2, 4), b = rand(1, 3), c = rand(1, 3), d = rand(2, 4);
                    let e = a*x + b*y, f = c*x - d*y;
                    return {
                        en: `Solve using matrix method: $${a}x + ${b}y = ${e}$ and $${c}x - ${d}y = ${f}$.`,
                        gu: `શ્રેણિક ની મદદ થી સમીકરણ $${a}x + ${b}y = ${e}$ અને $${c}x - ${d}y = ${f}$ ઉકેલો.`,
                        correct: `$x = ${x}, y = ${y}$`, 
                        distractors: [`$x = ${y}, y = ${x}$`, `$x = -${x}, y = ${y}$`, `$x = ${x+1}, y = ${y-1}$`],
                        solEn: `Write as $AX = B$. Find $A^{-1}$ and compute $X = A^{-1}B$.`, solGu: `$AX = B$ સ્વરૂપમાં લખીને $X = A^{-1}B$ નો ઉપયોગ કરો.`
                    };
                },
                () => { // 6. A^2 - kA - mI = 0
                    let a = 1, b = 2, c = 2, d = 3; 
                    let k = 4, m = 1;

                        return { en: `The mean of the first ${n} natural numbers is:`, gu: `પ્રથમ ${n} પ્રાકૃતિક સંખ્યાઓનો મધ્યક શું છે?`, correct: `$${(n+1)/2}$`, distractors: [`$${n/2}$`, `$${n}$`, `$${(n+2)/2}$`], solEn: `Formula $\\frac{n+1}{2}$.`, solGu: `સૂત્ર મુજબ.`};
                    } else if(type===2) {
                        let n1=rand(4,8), n2=rand(4,8), n3=rand(4,8), mean=rand(6,9);
                        let missing = (mean*4) - (n1+n2+n3);
                        return { en: `If mean of ${n1}, ${n2}, ${n3}, $a$ is ${mean}, then $a=$?`, gu: `જો ${n1}, ${n2}, ${n3}, $a$ નો મધ્યક ${mean} હોય, તો $a=$?`, correct: `$${missing}$`, distractors: [`$${missing+2}$`, `$${mean}$`, `$${missing-1}$`], solEn: `Sum = $4 \\times ${mean}$. So $a = ${mean*4} - (${n1+n2+n3})$.`, solGu: `સરવાળો મેળવીને કિંમત શોધો.`};
                    } else {
                        return { en: `Coefficient of Variation (CV) formula is:`, gu: `ચલનાંક (CV) નું સૂત્ર:`, correct: `$\\frac{\\sigma}{\\bar{x}} \\times 100$`, distractors: [`$\\frac{\\bar{x}}{\\sigma} \\times 100$`, `$\\frac{\\sigma^2}{\\bar{x}} \\times 100$`, `$\\frac{\\sigma}{\\bar{x}}$`], solEn: `Standard formula for CV.`, solGu: `પ્રમાણિત સૂત્ર.`}
                    }
                }
            ],
            "examples": [
                () => { // 1. Mean Deviation
                    return {
                        en: `Find the mean deviation of the data: 2, 4, 6, 8, 10.`,
                        gu: `2, 4, 6, 8, 10 નું સરેરાશ વિચલન શોધો.`,
                        correct: `$2.4$`, 
                        distractors: [`$6$`, `$3.2$`, `$0$`],
                        solEn: `Mean $\\bar{x} = 6$. Absolute deviations: 4, 2, 0, 2, 4. Sum = 12. Mean Deviation = $12/5 = 2.4$.`, 
                        solGu: `પ્રથમ મધ્યક 6 શોધો. પછી વિચલનોનો સરવાળો 12 મેળવી, સરેરાશ વિચલન 12/5 = 2.4 ગણો.`
                    };
                },
                () => { // 2. Standard Deviation
                    let variance = rand(3, 6) ** 2;
                    let sd = Math.sqrt(variance);
                    return {
                        en: `If the variance of a dataset is ${variance}, what is the standard deviation?`,
                        gu: `જો માહિતીનું વિચરણ ${variance} હોય, તો પ્રમાણિત વિચલન શું થાય?`,
                        correct: `$${sd}$`, 
                        distractors: [`$${variance*2}$`, `$${sd*2}$`, `$${variance}$`],
                        solEn: `Standard Deviation = $\\sqrt{\\text{Variance}} = \\sqrt{${variance}} = ${sd}$.`, 
                        solGu: `પ્રમાણિત વિચલન = $\\sqrt{\\text{વિચરણ}}$.`
                    };
                },
                () => { // 3. Grouped Data Mean
                    let f1 = rand(2, 4), f2 = rand(3, 5), f3 = rand(1, 3);
                    let totalF = f1 + f2 + f3;
                    let totalFX = (5*f1) + (15*f2) + (25*f3);
                    let mean = (totalFX / totalF).toFixed(2);
                    return {
                        en: `Calculate mean for classes (0-10, 10-20, 20-30) with frequencies (${f1}, ${f2}, ${f3}) respectively.`,
                        gu: `વર્ગો (0-10, 10-20, 20-30) અને આવૃત્તિ (${f1}, ${f2}, ${f3}) માટે મધ્યક ગણો.`,
                        correct: `$${mean}$`, 
                        distractors: [`$${(totalFX/(totalF+1)).toFixed(2)}$`, `$15$`, `$${(totalFX/3).toFixed(2)}$`],
                        solEn: `Class marks $x_i$: 5, 15, 25. Mean $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i} = \\frac{${totalFX}}{${totalF}} = ${mean}$.`, 
                        solGu: `મધ્યકિંમત $x_i$ શોધીને $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i}$ સૂત્ર વાપરો.`
                    };
                },
                () => { // 4. Missing Frequency
                    let sumF = rand(15, 25);
                    let mean = rand(5, 9);
                    let sumFx = sumF * mean;
                    return {
                        en: `For a frequency distribution, $\\Sigma f_i = ${sumF}$ and $\\Sigma f_i x_i = ${sumFx}$. Find the mean.`,
                        gu: `આવૃત્તિ વિતરણ માટે $\\Sigma f_i = ${sumF}$ અને $\\Sigma f_i x_i = ${sumFx}$ છે. મધ્યક શોધો.`,
                        correct: `$${mean}$`, distractors: [`$${mean+2}$`, `$${sumF}$`, `$${sumFx}$`],
                        solEn: `Mean $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i} = \\frac{${sumFx}}{${sumF}} = ${mean}$.`, 
                        solGu: `મધ્યક $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i}$ સૂત્ર નો ઉપયોગ કરો.`
                    }
                }
            ]
        }
    };

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const summaryCard = document.getElementById('summary-card');
        const actionBtns = document.getElementById('action-buttons');
        
        form.innerHTML = '';
        summaryCard.style.display = 'none';
        currentQuizData = [];

        startTimer();

        const numQuestions = type === 'mcq' ? 30 : 15; 
        const availableGenerators = generators[topic][type] || generators[topic]['mcq']; 

        for (let i = 0; i < numQuestions; i++) {
            // Cyclical generator selection guarantees broad syllabus coverage without skipping available types
            const genFunc = availableGenerators[i % availableGenerators.length];
            const qData = genFunc();

            let options = [{text: qData.correct, isCorrect: true}];
            qData.distractors.forEach(d => options.push({text: d, isCorrect: false}));
            options = shuffle(options);
            qData.shuffledOptions = options;

            currentQuizData.push(qData);

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        actionBtns.style.display = 'flex';
        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Test & View Full Solutions";
        
        MathJax.typesetPromise([form]);
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        const timeTaken = stopTimer();
        document.getElementById('timer-display').style.display = 'none';

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        const percentage = Math.round((score / currentQuizData.length) * 100);
        let feedbackMsg = "";
        let feedbackColor = "";
        
        if(percentage >= 80) { feedbackMsg = "Excellent Preparation! Keep it up. (ખૂબ સરસ તૈયારી!)"; feedbackColor = "#059669"; }
        else if(percentage >= 50) { feedbackMsg = "Good job, but keep practicing. (સારી મહેનત, વધુ પ્રેક્ટિસ કરો.)"; feedbackColor = "#d97706"; }
        else { feedbackMsg = "Needs more focus and practice. (વધુ ધ્યાન અને પ્રેક્ટિસ ની જરૂર છે.)"; feedbackColor = "#dc2626"; }

        const summaryCard = document.getElementById('summary-card');
        summaryCard.innerHTML = `
            <div class="summary-title">Test Completed!</div>
            <div class="summary-stats">
                Score: <strong>${score} / ${currentQuizData.length}</strong> (${percentage}%)<br>
                Time Taken: <strong>${timeTaken}</strong>
            </div>
            <div class="summary-msg" style="background-color: ${feedbackColor}; color: white;">${feedbackMsg}</div>
        `;
        summaryCard.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.style.display = 'none';

        MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
