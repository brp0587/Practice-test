<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTU Mathematics Complete Practice Bank</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #059669;
            --bg-light: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --accent: #2563eb;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5e7eb;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #d1d5db;
        }
        .control-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label.control-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 1.1em;
        }
        select, button {
            padding: 12px;
            font-size: 1.05em;
            border-radius: 6px;
            border: 1px solid #9ca3af;
        }
        button.primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            margin-top: auto;
        }
        button.primary-btn:hover { background: #1d4ed8; transform: translateY(-2px); }
        button.primary-btn:active { transform: translateY(0); }
        
        .question-block {
            margin-bottom: 35px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            border-left: 6px solid var(--accent);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .bilingual-en { font-weight: 600; color: #111827; }
        .bilingual-gu { color: var(--text-muted); font-size: 0.95em; margin-top: 8px; margin-bottom: 15px; }
        
        .options {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media(max-width: 700px) { .options { grid-template-columns: 1fr; } }
        
        .options label {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1em;
        }
        .options label:hover { background: #dbeafe; border-color: #93c5fd; }
        .options input[type="radio"] { margin-right: 15px; transform: scale(1.4); }
        .options input[type="radio"]:checked + span { font-weight: bold; color: var(--accent); }
        
        .solution {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 1.1em;
            line-height: 1.8;
        }
        .solution-correct { background-color: #d1fae5; border: 1px solid #34d399; color: #065f46; }
        .solution-incorrect { background-color: #fee2e2; border: 1px solid #f87171; color: #991b1b; }
        
        #submit-btn { display: none; width: 100%; font-size: 1.4em; padding: 20px; margin-top: 30px; background-color: var(--secondary); }
        #submit-btn:hover { background-color: #047857; }
        #score-display { display: none; font-size: 2em; font-weight: bold; text-align: center; margin-bottom: 30px; padding: 25px; background: #e0f2fe; color: #0369a1; border-radius: 12px; border: 2px solid #7dd3fc; }
    </style>
</head>
<body>

<div class="container">
    <h1>GTU Mathematics: Exhaustive Practice Bank</h1>
    
    <div class="controls">
        <div class="control-group">
            <label class="control-label" for="topicSelect">1. Select Topic (ટોપિક પસંદ કરો):</label>
            <select id="topicSelect">
                <option value="matrix">1. Matrices (શ્રેણિક)</option>
                <option value="differentiation">2. Differentiation (વિકલન)</option>
                <option value="integration">3. Integration (સંકલન)</option>
                <option value="diffeq">4. Differential Equations (વિકલ સમીકરણો)</option>
                <option value="complex">5. Complex Numbers (સંકર સંખ્યાઓ)</option>
                <option value="statistics">6. Statistics (આંકડાશાસ્ત્ર)</option>
            </select>
        </div>
        <div class="control-group">
            <label class="control-label" for="typeSelect">2. Practice Type (પ્રેક્ટિસ પ્રકાર):</label>
            <select id="typeSelect">
                <option value="mcq">MCQ type blanks (30 Questions)</option>
                <option value="examples">Practice Examples (15 Examples - All Methods)</option>
            </select>
        </div>
        <div class="control-group" style="justify-content: flex-end;">
            <button class="primary-btn" onclick="generateQuiz()">Generate Syllabus-Aligned Test</button>
        </div>
    </div>

    <div id="score-display"></div>
    <form id="quiz-form"></form>
    <button type="button" class="primary-btn" id="submit-btn" onclick="gradeQuiz()">Submit Test & View Full Solutions</button>
</div>

<script>
    // --- UTILITY FUNCTIONS ---
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // --- EXHAUSTIVE GENERATION ENGINE (ALL GTU METHODS) ---
    const generators = {
        "matrix": {
            "mcq": [
                () => { // Method: Order of Multiplication
                    let r1 = rand(1, 4), c1 = rand(2, 4), r2 = c1, c2 = rand(1, 4);
                    return {
                        en: `If matrix $A$ is of order $${r1} \\times ${c1}$ and $B$ is $${r2} \\times ${c2}$, what is the order of $AB$?`,
                        gu: `જો શ્રેણિક $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${r2} \\times ${c2}$ હોય, તો શ્રેણિક $AB$ ની કક્ષા શું થાય?`,
                        correct: `$${r1} \\times ${c2}$`, distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`],
                        solEn: `Order of multiplication $A_{m \\times n} B_{n \\times p}$ is $m \\times p$.`, solGu: `ગુણાકાર $A_{m \\times n} B_{n \\times p}$ ની કક્ષા $m \\times p$ થાય.`
                    };
                },
                () => { // Method: Adjoint of 2x2
                    let a = rand(-5, 5), b = rand(-5, 5), c = rand(-5, 5), d = rand(-5, 5);
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, then $\\text{adj}(A) =$ ?`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $\\text{adj}(A) =$ ?`,
                        correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-d} & ${b} \\\\ ${c} & ${-a} \\end{bmatrix}$`],
                        solEn: `Swap main diagonal elements, change signs of off-diagonal elements.`, solGu: `મુખ્ય વિકર્ણના ઘટકોની અદલાબદલી કરો અને અન્ય ઘટકોના ચિહ્નો બદલો.`
                    };
                },
                () => { // Method: Matrix Equality
                    let x = rand(2, 8), y = rand(1, 5), c = rand(1, 9);
                    return {
                        en: `If $\\begin{bmatrix} x - 1 & ${c} \\\\ 2 & y + 2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} & ${c} \\\\ 2 & ${y+2} \\end{bmatrix}$, then $x+y =$ ?`,
                        gu: `જો $\\begin{bmatrix} x - 1 & ${c} \\\\ 2 & y + 2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} & ${c} \\\\ 2 & ${y+2} \\end{bmatrix}$ હોય, તો $x+y =$ ?`,
                        correct: `$${x+y}$`, distractors: [`$${x+y+2}$`, `$${x+y-1}$`, `$${x-y}$`],
                        solEn: `Equating elements: $x-1 = ${x-1} \\implies x=${x}$. And $y+2 = ${y+2} \\implies y=${y}$. Sum = $${x+y}$.`, solGu: `ઘટકો સરખાવતા: $x=${x}$ અને $y=${y}$. સરવાળો = $${x+y}$.`
                    };
                },
                () => { // Method: Transpose
                    return {
                        en: `If $A$ and $B$ are compatible matrices, then $(AB)^T =$ ?`,
                        gu: `જો $A$ અને $B$ યોગ્ય શ્રેણિક હોય, તો $(AB)^T =$ ?`,
                        correct: `$B^T A^T$`, distractors: [`$A^T B^T$`, `$A B^T$`, `$A^{-1} B^{-1}$`],
                        solEn: `By the reversal law of transposes, $(AB)^T = B^T A^T$.`, solGu: `પરિવર્ત શ્રેણિકના નિયમ મુજબ, $(AB)^T = B^T A^T$.`
                    };
                }
            ],
            "examples": [
                () => { // Method: Inverse of Matrix (Added per request)
                    let a = rand(1, 3), b = rand(1, 3), c = rand(2, 4), d = rand(4, 6);
                    let det = (a*d) - (b*c);
                    // Ensure non-zero determinant for valid problem
                    if(det === 0) { d = d+1; det = (a*d) - (b*c); } 
                    return {
                        en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`,
                        correct: `$\\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\frac{1}{${det}}\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\frac{1}{${det+1}}\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`],
                        solEn: `$A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$. Determinant $|A| = (${a})(${d}) - (${b})(${c}) = ${det}$.`, 
                        solGu: `$A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$. નિશ્ચાયક $|A| = ${det}$ છે.`
                    };
                },
                () => { // Method: A^2 - kA - mI = 0
                    let a = 1, b = 2, c = 2, d = 3; 
                    let k = 4, m = 1; // A^2 - 4A - I = 0 for [1 2; 2 3]
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, then $A^2 - ${k}A - ${m}I =$ ?`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $A^2 - ${k}A - ${m}I =$ ?`,
                        correct: `$\\begin{bmatrix} 0 & 0 \\\\ 0 & 0 \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} 1 & 0 \\\\ 0 & 1 \\end{bmatrix}$`, `$\\begin{bmatrix} 1 & 2 \\\\ 2 & 3 \\end{bmatrix}$`, `$\\begin{bmatrix} -1 & 0 \\\\ 0 & -1 \\end{bmatrix}$`],
                        solEn: `Calculate $A^2 = \\begin{bmatrix} 5 & 8 \\\\ 8 & 13 \\end{bmatrix}$. $4A = \\begin{bmatrix} 4 & 8 \\\\ 8 & 12 \\end{bmatrix}$. Subtracting yields the zero matrix.`, 
                        solGu: `પ્રથમ $A^2$ શોધો, પછી તેમાંથી $4A$ અને $I$ બાદ કરતા શૂન્ય શ્રેણિક મળશે.`
                    };
                },
                () => { // Method: 2A + X = 3B
                    let a1 = rand(1,3), a2 = rand(-2,2), a3 = rand(0,4), a4 = rand(1,3);
                    let b1 = rand(2,4), b2 = rand(1,3), b3 = rand(-1,3), b4 = rand(2,5);
                    return {
                        en: `Find matrix $X$ if $2A + X = 3B$, where $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$.`,
                        gu: `જો સમીકરણ $2A + X = 3B$ હોય, જ્યાં $A$ અને $B$ આપેલ છે, તો શ્રેણિક $X$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${3*b1 - 2*a1} & ${3*b2 - 2*a2} \\\\ ${3*b3 - 2*a3} & ${3*b4 - 2*a4} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${2*a1 + 3*b1} & ${2*a2 + 3*b2} \\\\ ${2*a3 + 3*b3} & ${2*a4 + 3*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${3*b1 - a1} & ${3*b2 - a2} \\\\ ${3*b3 - a3} & ${3*b4 - a4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${b1 - a1} & ${b2 - a2} \\\\ ${b3 - a3} & ${b4 - a4} \\end{bmatrix}$`],
                        solEn: `$X = 3B - 2A$. Compute $3B$ and subtract $2A$ element by element.`, 
                        solGu: `$X = 3B - 2A$. $3B$ ની ગણતરી કરો અને તેમાંથી $2A$ બાદ કરો.`
                    };
                },
                () => { // Method: Linear Equations using Matrices
                    let x = rand(1, 3), y = rand(1, 3);
                    let a = rand(2, 4), b = rand(1, 3), c = rand(1, 3), d = rand(2, 4);
                    let e = a*x + b*y, f = c*x - d*y;
                    return {
                        en: `Solve using matrix method: $${a}x + ${b}y = ${e}$ and $${c}x - ${d}y = ${f}$.`,
                        gu: `શ્રેણિક ની મદદ થી સમીકરણ $${a}x + ${b}y = ${e}$ અને $${c}x - ${d}y = ${f}$ ઉકેલો.`,
                        correct: `$x = ${x}, y = ${y}$`, 
                        distractors: [`$x = ${y}, y = ${x}$`, `$x = -${x}, y = ${y}$`, `$x = ${x+1}, y = ${y-1}$`],
                        solEn: `Use $X = A^{-1}B$. Find inverse of coefficient matrix and multiply by constant matrix.`, 
                        solGu: `$X = A^{-1}B$ નો ઉપયોગ કરો. વ્યસ્ત શ્રેણિક શોધીને $x, y$ મેળવો.`
                    };
                },
                () => { // Method: Matrix Multiplication AB
                    let a1=rand(1,2), a2=rand(0,2), a3=rand(-1,1), a4=rand(1,3);
                    let b1=rand(2,3), b2=rand(-1,1), b3=rand(1,2), b4=rand(0,2);
                    let c1 = a1*b1+a2*b3, c2 = a1*b2+a2*b4, c3 = a3*b1+a4*b3, c4 = a3*b2+a4*b4;
                    return {
                        en: `If $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$, find $AB$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ અને $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$ હોય, તો $AB$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${c1} & ${c2} \\\\ ${c3} & ${c4} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${c1+1} & ${c2} \\\\ ${c3} & ${c4-1} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a1*b1} & ${a2*b2} \\\\ ${a3*b3} & ${a4*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${c4} & ${c3} \\\\ ${c2} & ${c1} \\end{bmatrix}$`],
                        solEn: `Multiply rows of A with columns of B: $C_{11} = (${a1})(${b1}) + (${a2})(${b3}) = ${c1}$, etc.`, 
                        solGu: `A ની હાર અને B ના સ્તંભનો ગુણાકાર કરો.`
                    };
                }
            ]
        },
        "differentiation": {
            "mcq": [
                () => { // Power Rule
                    let n = rand(4, 9);
                    return {
                        en: `$\\frac{d}{dx}(x^{${n}}) = $ ?`, gu: `$\\frac{d}{dx}(x^{${n}}) = $ ?`,
                        correct: `$${n}x^{${n-1}}$`, distractors: [`$${n}x^{${n}}$`, `$\\frac{x^{${n+1}}}{${n+1}}$`, `$x^{${n-1}}$`],
                        solEn: `Power rule: $\\frac{d}{dx}(x^n) = n x^{n-1}$.`, solGu: `ઘાતના નિયમ મુજબ: $\\frac{d}{dx}(x^n) = n x^{n-1}$.`
                    };
                },
                () => { // Chain Rule Trig
                    let k = rand(2, 6);
                    return {
                        en: `$\\frac{d}{dx}(\\sin ${k}x) = $ ?`, gu: `$\\frac{d}{dx}(\\sin ${k}x) = $ ?`,
                        correct: `$${k}\\cos ${k}x$`, distractors: [`$\\cos ${k}x$`, `$-${k}\\cos ${k}x$`, `$\\frac{\\cos ${k}x}{${k}}$`],
                        solEn: `Chain rule: $\\cos(${k}x) \\cdot \\frac{d}{dx}(${k}x) = ${k}\\cos ${k}x$.`, solGu: `સાંકળ નિયમ મુજબ: $\\cos(${k}x) \\cdot \\frac{d}{dx}(${k}x) = ${k}\\cos ${k}x$.`
                    };
                },
                () => { // Identity trick
                    return {
                        en: `$\\frac{d}{dx}(\\sec^2 x - \\tan^2 x) = $ ?`, gu: `$\\frac{d}{dx}(\\sec^2 x - \\tan^2 x) = $ ?`,
                        correct: `$0$`, distractors: [`$1$`, `$2\\sec x \\tan x$`, `$-1$`],
                        solEn: `Trig identity: $\\sec^2 x - \\tan^2 x = 1$. Derivative of constant 1 is 0.`, solGu: `ત્રિકોણમિતીય નિત્યસમ: $\\sec^2 x - \\tan^2 x = 1$. અચળ 1 નું વિકલન 0 થાય.`
                    };
                }
            ],
            "examples": [
                () => { // Method: Maxima and Minima (Added per request)
                    let c = rand(1, 15);
                    // Base: f(x) = 2x^3 - 3x^2 - 12x + C
                    return {
                        en: `Find the maximum and minimum values of $f(x) = 2x^3 - 3x^2 - 12x + ${c}$.`,
                        gu: `વિધેય $f(x) = 2x^3 - 3x^2 - 12x + ${c}$ ની મહત્તમ અને ન્યૂનત્તમ કિંમત શોધો.`,
                        correct: `Max = $${7+c}$, Min = $${-20+c}$`, 
                        distractors: [`Max = $${-20+c}$, Min = $${7+c}$`, `Max = $${10+c}$, Min = $${-15+c}$`, `Max = $${c}$, Min = $0$`],
                        solEn: `$f'(x) = 6x^2-6x-12 = 0 \\implies x=2, -1$. $f''(x)=12x-6$. $f''(-1)=-18$ (Max), $f''(2)=18$ (Min). Substitute values back into $f(x)$.`, 
                        solGu: `વિકલન $f'(x) ને 0 સાથે સરખાવી x ની કિંમત શોધો. દ્વિતીય વિકલન $f''(x)$ માં કિંમત મુકો.`
                    }
                },
                () => { // Method: Logarithmic Differentiation 1
                    return {
                        en: `If $y = x^x$, find $\\frac{dy}{dx}$.`,
                        gu: `જો $y = x^x$ હોય, તો $\\frac{dy}{dx}$ શોધો.`,
                        correct: `$x^x(1 + \\log_e x)$`, 
                        distractors: [`$x \\cdot x^{x-1}$`, `$x^x \\log_e x$`, `$1 + \\log_e x$`],
                        solEn: `Take log on both sides: $\\log y = x \\log x$. Diff: $\\frac{1}{y}\\frac{dy}{dx} = 1\\cdot\\log x + x\\cdot\\frac{1}{x} = 1 + \\log x$.`, 
                        solGu: `બંને બાજુ log લો: $\\log y = x \\log x$. વિકલન કરતા જવાબ મળશે.`
                    }
                },
                () => { // Method: Logarithmic Differentiation 2 (Trig)

                        distractors: [`$\\frac{1}{13} + \\frac{18}{13}i$`, `$\\frac{-1}{13} + \\frac{18}{13}i$`, `$\\frac{4+3i}{2-3i}$`],

                    };
                },
                () => { // Method: Equating Real/Imaginary
                    let x = rand(2, 5), y = rand(2, 5);

                    return {
                        en: `Find $x, y \\in \\mathbb{R}$ if $(2x-y) + 2yi = ${realPart} + ${imagPart}i$.`,
                        gu: `જો $(2x-y) + 2yi = ${realPart} + ${imagPart}i$ હોય, તો વાસ્તવિક $x, y$ શોધો.`,
                        correct: `$x = ${x}, y = ${y}$`, 
                        distractors: [`$x = ${y}, y = ${x}$`, `$x = ${x+1}, y = ${y}$`, `$x = -${x}, y = -${y}$`],
                        solEn: `Equate imaginary parts: $2y = ${imagPart} \\implies y = ${y}$. Equate real parts: $2x - y = ${realPart} \\implies x = ${x}$.`, 
                        solGu: `વાસ્તવિક અને કાલ્પનિક ભાગ સરખાવતા.`
                    };
                },
                () => { // Method: Polar Form
                    return {
                        en: `Express $1 + i\\sqrt{3}$ in polar form.`,
                        gu: `$1 + i\\sqrt{3}$ ને ધ્રુવીય સ્વરૂપમાં દર્શાવો.`,
                        correct: `$2(\\cos \\frac{\\pi}{3} + i\\sin \\frac{\\pi}{3})$`, 
                        distractors: [`$2(\\cos \\frac{\\pi}{6} + i\\sin \\frac{\\pi}{6})$`, `$\\sqrt{2}(\\cos \\frac{\\pi}{3} + i\\sin \\frac{\\pi}{3})$`, `$2(\\cos \\frac{2\\pi}{3} + i\\sin \\frac{2\\pi}{3})$`],
                        solEn: `$r = \\sqrt{1+3} = 2$. $\\theta = \\tan^{-1}(\\sqrt{3}/1) = \\pi/3$. Polar form is $r(\\cos\\theta + i\\sin\\theta)$.`, 
                        solGu: `$r = 2$ અને $\\theta = \\pi/3$. ધ્રુવીય સ્વરૂપ $r(\\cos\\theta + i\\sin\\theta)$ છે.`
                    };
                },
                () => { // Method: De Moivre's Theorem
                    return {
                        en: `Simplify using De Moivre's Theorem: $\\frac{(\\cos 2\\theta + i\\sin 2\\theta)^{-3} \\cdot (\\cos 3\\theta - i\\sin 3\\theta)^2}{(\\cos \\theta + i\\sin \\theta)^{-12}}$`,
                        gu: `દ'મોવરના પ્રમેયથી સાદુરૂપ આપો: $\\frac{(\\cos 2\\theta + i\\sin 2\\theta)^{-3} \\cdot (\\cos 3\\theta - i\\sin 3\\theta)^2}{(\\cos \\theta + i\\sin \\theta)^{-12}}$`,
                        correct: `$\\cos 0 + i\\sin 0 = 1$`, 
                        distractors: [`$\\cos 12\\theta + i\\sin 12\\theta$`, `$\\cos 24\\theta - i\\sin 24\\theta$`, `$-1$`],
                        solEn: `Convert to powers: $e^{i(-6\\theta)} \\cdot e^{i(-6\\theta)} / e^{i(-12\\theta)} = e^{i(-12\\theta)} / e^{i(-12\\theta)} = e^0 = 1$.`, 
                        solGu: `ઘાતાંકમાં ફેરવો. અંશ અને છેદ સમાન હોવાથી જવાબ 1 આવશે.`
                    }
                }
            ]
        },
        "statistics": {
            "mcq": [
                () => { // Mean of first n
                    let n = rand(5, 11);
                    return {
                        en: `The mean of the first ${n} natural numbers is:`, gu: `પ્રથમ ${n} પ્રાકૃતિક સંખ્યાઓનો મધ્યક શું છે?`,
                        correct: `$${(n+1)/2}$`, distractors: [`$${n/2}$`, `$${n}$`, `$${(n+2)/2}$`],
                        solEn: `Formula: $\\frac{n+1}{2} = \\frac{${n}+1}{2} = ${(n+1)/2}$.`, solGu: `સૂત્ર: $\\frac{n+1}{2} = ${(n+1)/2}$.`
                    };
                },
                () => { // Find missing variable
                    let n1=rand(4,8), n2=rand(4,8), n3=rand(4,8), mean=rand(6,9);
                    let missing = (mean*4) - (n1+n2+n3);
                    return {
                        en: `If the mean of ${n1}, ${n2}, ${n3}, $a$ is ${mean}, then $a = $ ?`, gu: `જો ${n1}, ${n2}, ${n3}, $a$ નો મધ્યક ${mean} હોય, તો $a = $ ?`,
                        correct: `$${missing}$`, distractors: [`$${missing+2}$`, `$${mean}$`, `$${missing-1}$`],
                        solEn: `Sum = $4 \\times ${mean} = ${mean*4}$. So, $a = ${mean*4} - (${n1+n2+n3}) = ${missing}$.`, solGu: `સરવાળો = $4 \\times ${mean} = ${mean*4}$. તેથી $a = ${missing}$.`
                    };
                }
            ],
            "examples": [
                () => { // Method: Basic Mean calc
                    let d = Array.from({length: 5}, () => rand(4, 12));
                    let sum = d.reduce((a,b)=>a+b, 0);
                    return {
                        en: `Find the mean of the data: ${d.join(', ')}`,
                        gu: `માહિતીનો મધ્યક શોધો: ${d.join(', ')}`,
                        correct: `$${sum/5}$`, 
                        distractors: [`$${(sum/5 + 0.5).toFixed(1)}$`, `$${sum/4}$`, `$${sum}$`],
                        solEn: `Mean = $\\frac{\\Sigma x}{n} = \\frac{${sum}}{5} = ${sum/5}$.`, 
                        solGu: `મધ્યક $\\bar{x} = \\frac{\\Sigma x}{n} = \\frac{${sum}}{5} = ${sum/5}$.`
                    };
                },
                () => { // Method: Mean Deviation
                    let d = [2, 4, 6, 8, 10]; // Mean is 6. Devs: 4, 2, 0, 2, 4 = 12. MD = 12/5 = 2.4
                    return {
                        en: `Find the mean deviation of the data: 2, 4, 6, 8, 10.`,
                        gu: `2, 4, 6, 8, 10 નું સરેરાશ વિચલન શોધો.`,
                        correct: `$2.4$`, 
                        distractors: [`$6$`, `$3.2$`, `$0$`],
                        solEn: `Mean = 6. Absolute deviations from mean: 4, 2, 0, 2, 4. Sum = 12. Mean Deviation = 12/5 = 2.4.`, 
                        solGu: `મધ્યક 6 છે. વિચલનોનો સરવાળો 12 થાય. સરેરાશ વિચલન 12/5 = 2.4.`
                    };
                },
                () => { // Method: Grouped Data Mean Concept
                    let f1 = rand(2, 4), f2 = rand(3, 5), f3 = rand(1, 3);
                    let totalF = f1 + f2 + f3;
                    let totalFX = (5*f1) + (15*f2) + (25*f3);
                    let mean = (totalFX / totalF).toFixed(2);
                    return {
                        en: `Calculate the mean for classes (0-10, 10-20, 20-30) with frequencies (${f1}, ${f2}, ${f3}) respectively.`,
                        gu: `વર્ગો (0-10, 10-20, 20-30) અને આવૃત્તિ (${f1}, ${f2}, ${f3}) માટે મધ્યક ગણો.`,
                        correct: `$${mean}$`, 
                        distractors: [`$${(totalFX/(totalF+1)).toFixed(2)}$`, `$15$`, `$${(totalFX/3).toFixed(2)}$`],
                        solEn: `Find class marks $x_i$: 5, 15, 25. Mean $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i} = \\frac{${totalFX}}{${totalF}} = ${mean}$.`, 
                        solGu: `મધ્યકિંમત $x_i$ શોધીને $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i}$ સૂત્ર વાપરો.`
                    };
                },
                () => { // Method: Standard Deviation logic
                    let variance = rand(3, 6) ** 2;
                    let sd = Math.sqrt(variance);
                    return {
                        en: `If the variance of a dataset is ${variance}, what is the standard deviation?`,
                        gu: `જો માહિતીનું વિચરણ ${variance} હોય, તો પ્રમાણિત વિચલન શું થાય?`,
                        correct: `$${sd}$`, 
                        distractors: [`$${variance*2}$`, `$${sd*2}$`, `$${variance}$`],
                        solEn: `Standard Deviation = $\\sqrt{\\text{Variance}} = \\sqrt{${variance}} = ${sd}$.`, 
                        solGu: `પ્રમાણિત વિચલન = $\\sqrt{\\text{વિચરણ}} = \\sqrt{${variance}} = ${sd}$.`
                    };
                }
            ]
        }
    };

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const scoreDisplay = document.getElementById('score-display');
        
        form.innerHTML = '';
        scoreDisplay.style.display = 'none';
        currentQuizData = [];

        // STRICTLY 30 MCQS OR 15 EXAMPLES
        const numQuestions = type === 'mcq' ? 30 : 15; 
        const availableGenerators = generators[topic][type] || generators[topic]['mcq']; 

        for (let i = 0; i < numQuestions; i++) {
            // Cycle through available methods sequentially using modulo. 
            // This guarantees NO method is skipped and NO duplicate methods appear before every method has been shown once.
            const genFunc = availableGenerators[i % availableGenerators.length];
            const qData = genFunc();

            // Prepare shuffled options
            let options = [{text: qData.correct, isCorrect: true}];
            qData.distractors.forEach(d => options.push({text: d, isCorrect: false}));
            options = shuffle(options);
            qData.shuffledOptions = options;

            currentQuizData.push(qData);

            // Construct DOM element
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Test & View Full Solutions";
        
        // Trigger MathJax to render formulas
        MathJax.typesetPromise([form]);
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Explanation:</strong> ${qData.solEn}<br><br><strong>સમજૂતી:</strong> ${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Explanation:</strong> ${qData.solEn}<br><br><strong>સમજૂતી:</strong> ${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.innerHTML = `Your Score: ${score} / ${currentQuizData.length}`;
        scoreDisplay.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = "Practice Session Completed";

        MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
