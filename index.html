<html lang="en">
<head>

    <title>GTU Mathematics: Complete Syllabus Practice Bank</title>
    
    <script>
        window.MathJax = {

    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #b91c1c;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #0284c7;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: 80px; 
            line-height: 1.6;
        }
        .container {
            max-width: 1050px;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        
        #timer-display {
            display: none;
            position: absolute;
            top: 25px;
            right: 35px;
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #cbd5e1;
        }
        .control-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label.control-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 1.1em;
        }
        select, button {
            padding: 12px;
            font-size: 1.05em;
            border-radius: 6px;
            border: 1px solid #94a3b8;
        }
        button.primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            margin-top: auto;
        }
        button.primary-btn:hover { background: #0369a1; transform: translateY(-2px); }
        button.primary-btn:active { transform: translateY(0); }

        button.action-btn {
            background: #059669;
            color: white;
            border: none;
            font-size: 1.3em;
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button.action-btn:hover { background: #047857; }
        
        button.print-btn { background: #475569; }
        button.print-btn:hover { background: #334155; }
        
        .action-buttons-container {
            display: none;
            gap: 15px;
            margin-top: 30px;
        }
        
        .question-block {
            margin-bottom: 35px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            border-left: 6px solid var(--accent);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .bilingual-en { font-weight: 600; color: #0f172a; }
        .bilingual-gu { color: var(--text-muted); font-size: 0.95em; margin-top: 8px; margin-bottom: 15px; }
        
        .options {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media(max-width: 700px) { .options { grid-template-columns: 1fr; } }
        
        .options label {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1em;
        }
        .options label:hover { background: #e0f2fe; border-color: #7dd3fc; }
        .options input[type="radio"] { margin-right: 15px; transform: scale(1.4); }
        .options input[type="radio"]:checked + span { font-weight: bold; color: var(--accent); }
        
        .solution {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 1.05em;
            line-height: 1.8;
            border-top: 2px dashed #cbd5e1;
        }
        .solution-correct { background-color: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
        .solution-incorrect { background-color: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
        .step-title { font-weight: bold; color: var(--primary); margin-top: 8px; display: inline-block; }

        #summary-card {
            display: none;
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: #f0f9ff;
            color: #0369a1;
            border-radius: 12px;
            border: 2px solid #38bdf8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .summary-title { font-size: 2em; font-weight: bold; margin-bottom: 10px; }
        .summary-stats { font-size: 1.3em; margin-bottom: 15px; }
        .summary-msg { font-size: 1.2em; font-weight: bold; padding: 10px; border-radius: 6px; display: inline-block; }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            font-size: 0.95em;
            z-index: 1000;
        }
        .footer .visitor-counter { display: flex; align-items: center; gap: 10px; }

        @media print {
            body { background: #fff; padding: 0; color: #000; }
            .container { box-shadow: none; max-width: 100%; margin: 0; padding: 0; }
            .controls, .action-buttons-container, .footer, #timer-display { display: none !important; }
            .question-block { page-break-inside: avoid; border: 1px solid #ccc; box-shadow: none; }
            .options label { border: 1px solid #ccc; background: #fff; }
            #summary-card { border: 1px solid #ccc; background: #fff; color: #000; }
        }
    </style>
</head>

<div class="container">

    <h1>GTU Mathematics: Complete Syllabus Practice</h1>
    
    <div class="controls">
        <div class="control-group">
            <label class="control-label" for="topicSelect">1. Select Topic (ટોપિક પસંદ કરો):</label>

                <option value="matrix">1. Matrices (શ્રેણિક)</option>

</div>

<script>
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let timerInterval;
    let secondsElapsed = 0;
    function startTimer() {
        clearInterval(timerInterval);
        secondsElapsed = 0;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.style.display = 'block';
        timerDisplay.innerText = "⏱ 00:00";
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            let s = (secondsElapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `⏱ ${m}:${s}`;
        }, 1000);
    }
    function stopTimer() {
        clearInterval(timerInterval);
        let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let s = (secondsElapsed % 60).toString().padStart(2, '0');
        return `${m} minutes and ${s} seconds`;
    }

    // MEGA-GENERATORS: Strictly aligned with GTU past papers. Out-of-topic items removed.
    const generators = {
        "matrix": {
            "mcq": [
                () => { 
                    let r1 = rand(2, 4), c1 = rand(2, 4); 
                    while(r1 === c1) c1 = rand(2,4); 
                    let c2 = rand(2, 4); 
                    while(c2 === c1 || c2 === r1) c2 = rand(2,4);
                    return { 
                        en: `If matrix $A$ is $${r1} \\times ${c1}$ and $B$ is $${c1} \\times ${c2}$, what is the order of $AB$?`, 
                        gu: `જો $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${c1} \\times ${c2}$ હોય, તો $AB$ ની કક્ષા:`, 
                        correct: `$${r1} \\times ${c2}$`, 
                        distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`], 
                        solEn: `Rule: $(m \\times n) \\times (n \\times p) = m \\times p$.`, 
                        solGu: `શ્રેણિક ગુણાકારનો નિયમ.` 
                    }; 
                },
                () => { return { en: `If $A$ is a square matrix and $|A| = 0$, then $A$ is called:`, gu: `જો ચોરસ શ્રેણિક $A$ માટે $|A| = 0$ હોય, તો $A$ ને શું કહેવાય?`, correct: `Singular Matrix`, distractors: [`Non-singular Matrix`, `Identity Matrix`, `Symmetric Matrix`], solEn: `Definition of Singular Matrix.`, solGu: `અસામાન્ય શ્રેણિકની વ્યાખ્યા.` }; },
                () => { return { en: `Which of the following is true for transpose of matrices $A$ and $B$?`, gu: `શ્રેણિક $A$ અને $B$ ના પરિવર્ત માટે નીચેનામાંથી શું સાચું છે?`, correct: `$(AB)^T = B^T A^T$`, distractors: [`$(AB)^T = A^T B^T$`, `$(A+B)^T = A^T B^T$`, `$(AB)^T = A^{-1} B^{-1}$`], solEn: `Reversal law of transposes.`, solGu: `પરિવર્ત શ્રેણિકના નિયમ મુજબ.` }; },
                () => { return { en: `If $A \\cdot A^{-1} = I$, what is $I$?`, gu: `જો $A \\cdot A^{-1} = I$ હોય, તો $I$ શું છે?`, correct: `Identity Matrix`, distractors: [`Zero Matrix`, `Adjoint Matrix`, `Symmetric Matrix`], solEn: `Multiplying a matrix by its inverse yields the Identity matrix.`, solGu: `શ્રેણિક અને તેના વ્યસ્ત નો ગુણાકાર એકમ શ્રેણિક આપે છે.` }; },
                () => { let a = rand(-5, 5), b = rand(-5, 5), c = rand(-5, 5), d = rand(-5, 5); return { en: `Find the adjoint of $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, gu: `$A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ નો સહઅવયવજ શ્રેણિક (adj A) શોધો.`, correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-a} & ${-b} \\\\ ${-c} & ${-d} \\end{bmatrix}$`], solEn: `Swap main diagonal, flip signs of off-diagonal.`, solGu: `મુખ્ય વિકર્ણ બદલો, અન્યના ચિહ્નો બદલો.` }; },
                () => { let k = rand(2, 5), a = rand(1, 4), d = rand(1, 4); return { en: `If $A = \\begin{bmatrix} ${a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$, then $${k}A =$ ?`, gu: `જો $A = \\begin{bmatrix} ${a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$ હોય, તો $${k}A =$ ?`, correct: `$\\begin{bmatrix} ${k*a} & 0 \\\\ 0 & ${k*d} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${a+k} & 0 \\\\ 0 & ${d+k} \\end{bmatrix}$`, `$\\begin{bmatrix} ${k*a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a} & 0 \\\\ 0 & ${k*d} \\end{bmatrix}$`], solEn: `Multiply every element by ${k}.`, solGu: `દરેક ઘટકને ${k} વડે ગુણો.` }; },
                () => { 
                    let x = rand(2, 6), y = rand(1, 5); 
                    return { 
                        en: `If $\\begin{bmatrix} x-1 \\\\ y+2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} \\\\ ${y+2} \\end{bmatrix}$, find $x+y$.`, 
                        gu: `જો $\\begin{bmatrix} x-1 \\\\ y+2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} \\\\ ${y+2} \\end{bmatrix}$ હોય, તો $x+y$ શોધો.`, 
                        correct: `$${x+y}$`, 
                        distractors: [`$${x+y+2}$`, `$${x-y}$`, `$${x+y-1}$`], 
                        solEn: `Equate elements: $x-1=${x-1}, y+2=${y+2}$. Sum is ${x+y}$.`, 
                        solGu: `ઘટકો સરખાવો અને સરવાળો કરો.` 
                    }; 
                }
            ],
            "examples": [
                () => { let a = rand(1, 3), b = rand(1, 3), c = rand(2, 4), d = rand(4, 6); let det = (a*d) - (b*c); if(det === 0) { d++; det = (a*d) - (b*c); } return { en: `Find $A^{-1}$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $A^{-1}$ શોધો.`, correct: `$\\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, distractors: [`$\\frac{1}{${det}}\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\frac{1}{${det+1}}\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`], solEn: `Determinant $|A| = ${det}$. $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$.`, solGu: `નિશ્ચાયક $|A| = ${det}$. $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ વાપરો.` }; },
                () => { return { en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & 1 \\end{bmatrix}$.`, gu: `જો $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & 1 \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`, correct: `$\\frac{1}{2}\\begin{bmatrix} 1 & 1 & -1 \\\\ -9 & -7 & 11 \\\\ -5 & -5 & 7 \\end{bmatrix}$`, distractors: [`$\\frac{1}{-2}\\begin{bmatrix} 1 & 1 & -1 \\\\ 9 & 7 & 11 \\\\ 5 & 5 & 7 \\end{bmatrix}$`, `$\\begin{bmatrix} 1 & 1 & -1 \\\\ -9 & -7 & 11 \\\\ -5 & -5 & 7 \\end{bmatrix}$`, `$\\frac{1}{4}\\begin{bmatrix} 1 & 2 & 1 \\\\ -9 & -7 & 11 \\\\ -5 & -5 & 7 \\end{bmatrix}$`], solEn: `<span class="step-title">Step 1:</span> Find $|A| = 3(1) -(-1)(9) + 2(-5) = 2$.<br><span class="step-title">Step 2:</span> Find Cofactors and Adjoint matrix.<br><span class="step-title">Step 3:</span> $A^{-1} = \\frac{1}{2} \\text{adj}(A)$.`, solGu: `પ્રથમ નિશ્ચાયક |A| = 2 શોધો. પછી સહઅવયવજ શ્રેણિક શોધીને $A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ સૂત્ર વાપરો.` }; },
                () => { let a1 = rand(1,3), a2 = rand(-2,2), a3 = rand(0,4), a4 = rand(1,3); let b1 = rand(2,4), b2 = rand(1,3), b3 = rand(-1,3), b4 = rand(2,5); return { en: `Find matrix $X$ if $2A + X = 3B$, where $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$.`, gu: `જો સમીકરણ $2A + X = 3B$ હોય, તો શ્રેણિક $X$ શોધો.`, correct: `$\\begin{bmatrix} ${3*b1 - 2*a1} & ${3*b2 - 2*a2} \\\\ ${3*b3 - 2*a3} & ${3*b4 - 2*a4} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${2*a1 + 3*b1} & ${2*a2 + 3*b2} \\\\ ${2*a3 + 3*b3} & ${2*a4 + 3*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${b1 - a1} & ${b2 - a2} \\\\ ${b3 - a3} & ${b4 - a4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${3*b1 - a1} & ${3*b2 - a2} \\\\ ${3*b3 - a3} & ${3*b4 - a4} \\end{bmatrix}$`], solEn: `Rearrange to $X = 3B - 2A$. Compute $3B$ and subtract $2A$ element by element.`, solGu: `સમીકરણ $X = 3B - 2A$ બનાવો. 3B ની ગણતરી કરો અને તેમાંથી 2A બાદ કરો.` }; },
                () => { let a1=rand(1,2), a2=rand(0,2), a3=rand(-1,1), a4=rand(1,3); let b1=rand(2,3), b2=rand(-1,1), b3=rand(1,2), b4=rand(0,2); let c1 = a1*b1+a2*b3, c2 = a1*b2+a2*b4, c3 = a3*b1+a4*b3, c4 = a3*b2+a4*b4; return { en: `If $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$, find $AB$.`, gu: `જો $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ અને $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$ હોય, તો $AB$ શોધો.`, correct: `$\\begin{bmatrix} ${c1} & ${c2} \\\\ ${c3} & ${c4} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${c1+1} & ${c2} \\\\ ${c3} & ${c4-1} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a1*b1} & ${a2*b2} \\\\ ${a3*b3} & ${a4*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${c4} & ${c3} \\\\ ${c2} & ${c1} \\end{bmatrix}$`], solEn: `Multiply rows of A with columns of B: $C_{11} = (${a1})(${b1}) + (${a2})(${b3}) = ${c1}$, etc.`, solGu: `A ની હાર અને B ના સ્તંભનો ગુણાકાર કરો.` }; },

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const summaryCard = document.getElementById('summary-card');
        const actionBtns = document.getElementById('action-buttons');
        
        form.innerHTML = '';
        summaryCard.style.display = 'none';
        currentQuizData = [];

        startTimer();

        const numQuestions = type === 'mcq' ? 30 : 15; 
        const availableGenerators = generators[topic][type] || generators[topic]['mcq']; 

        let generatorIndex = 0;
        
        for (let i = 0; i < numQuestions; i++) {
            let qData;
            let options;
            let attempts = 0;
            let isDuplicate = true;

            // STRICT ANTI-DUPLICATION ENGINE
            while (isDuplicate && attempts < 100) {
                const genFunc = availableGenerators[(generatorIndex + attempts) % availableGenerators.length];
                qData = genFunc();
                
                // 1. Ensure the exact question text hasn't been used yet
                let textExists = currentQuizData.some(existingQ => existingQ.en === qData.en);
                
                // 2. Ensure all 4 options generated are distinct from each other
                let rawOptions = [{text: qData.correct, isCorrect: true}];
                qData.distractors.forEach(d => rawOptions.push({text: d, isCorrect: false}));
                let uniqueOptionTexts = new Set(rawOptions.map(o => String(o.text)));
                
                if (textExists || uniqueOptionTexts.size < 4) {
                    isDuplicate = true;
                    attempts++;
                } else {
                    isDuplicate = false;
                    options = rawOptions;
                }
            }
            
            generatorIndex++;

            options = shuffle(options);
            qData.shuffledOptions = options;
            currentQuizData.push(qData);

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        actionBtns.style.display = 'flex';
        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Test & View Full Solutions";
        
        MathJax.typesetPromise([form]);
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        const timeTaken = stopTimer();
        document.getElementById('timer-display').style.display = 'none';

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Explanation:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        const percentage = Math.round((score / currentQuizData.length) * 100);
        let feedbackMsg = "";
        let feedbackColor = "";
        
        if(percentage >= 80) { feedbackMsg = "Excellent Preparation! Keep it up. (ખૂબ સરસ તૈયારી!)"; feedbackColor = "#059669"; }
        else if(percentage >= 50) { feedbackMsg = "Good job, but keep practicing. (સારી મહેનત, વધુ પ્રેક્ટિસ કરો.)"; feedbackColor = "#d97706"; }
        else { feedbackMsg = "Needs more focus and practice. (વધુ ધ્યાન અને પ્રેક્ટિસ ની જરૂર છે.)"; feedbackColor = "#dc2626"; }

        const summaryCard = document.getElementById('summary-card');
        summaryCard.innerHTML = `
            <div class="summary-title">Test Completed!</div>
            <div class="summary-stats">
                Score: <strong>${score} / ${currentQuizData.length}</strong> (${percentage}%)<br>
                Time Taken: <strong>${timeTaken}</strong>
            </div>
            <div class="summary-msg" style="background-color: ${feedbackColor}; color: white;">${feedbackMsg}</div>
        `;
        summaryCard.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.style.display = 'none';

        MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
