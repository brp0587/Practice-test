<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTU Applied & Engineering Mathematics Practice</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #1a5f7a;
            --secondary: #22a699;
            --bg-light: #f8f9fa;
            --text-main: #333;
            --text-muted: #666;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 950px;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--bg-light);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #e0e0e0;
        }
        .control-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label.control-label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }
        select, button {
            padding: 12px;
            font-size: 1.05em;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button.primary-btn {
            background: var(--secondary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            margin-top: auto;
        }
        button.primary-btn:hover { background: #1b857a; transform: translateY(-2px); }
        button.primary-btn:active { transform: translateY(0); }
        
        .question-block {
            margin-bottom: 35px;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            border-left: 6px solid var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .question-text {
            font-size: 1.15em;
            margin-bottom: 20px;
        }
        .bilingual-en { font-weight: 600; color: #2c3e50; }
        .bilingual-gu { color: var(--text-muted); font-size: 0.95em; margin-top: 6px; margin-bottom: 15px; }
        
        .options {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media(max-width: 650px) { .options { grid-template-columns: 1fr; } }
        
        .options label {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05em;
        }
        .options label:hover { background: #e2e8f0; }
        .options input[type="radio"] { margin-right: 15px; transform: scale(1.3); }
        .options input[type="radio"]:checked + span { font-weight: bold; }
        
        .solution {
            margin-top: 20px;
            padding: 20px;
            border-radius: 6px;
            display: none;
            font-size: 1.05em;
        }
        .solution-correct { background-color: #d1e7dd; border: 1px solid #badbcc; color: #0f5132; }
        .solution-incorrect { background-color: #f8d7da; border: 1px solid #f5c2c7; color: #842029; }
        
        #submit-btn { display: none; width: 100%; font-size: 1.3em; padding: 18px; margin-top: 30px; }
        #score-display { display: none; font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 30px; padding: 20px; background: #cff4fc; color: #055160; border-radius: 8px; border: 2px solid #b6effb; }
    </style>
</head>
<body>

<div class="container">
    <h1>GTU Mathematics Exam Prep</h1>
    
    <div class="controls">
        <div class="control-group">
            <label class="control-label" for="topicSelect">1. Select Topic (ટોપિક પસંદ કરો):</label>
            <select id="topicSelect">
                <option value="matrix">1. Matrices (શ્રેણિક)</option>
                <option value="differentiation">2. Differentiation (વિકલન)</option>
                <option value="integration">3. Integration (સંકલન)</option>
                <option value="diffeq">4. Differential Equations (વિકલ સમીકરણો)</option>
                <option value="complex">5. Complex Numbers (સંકર સંખ્યાઓ)</option>
                <option value="statistics">6. Statistics (આંકડાશાસ્ત્ર)</option>
            </select>
        </div>
        <div class="control-group">
            <label class="control-label" for="typeSelect">2. Practice Type (પ્રેક્ટિસ પ્રકાર):</label>
            <select id="typeSelect">
                <option value="mcq">MCQ type blanks (30 Questions)</option>
                <option value="examples">Examples (8 Examples)</option>
            </select>
        </div>
        <div class="control-group" style="justify-content: flex-end;">
            <button class="primary-btn" onclick="generateQuiz()">Generate Practice Session</button>
        </div>
    </div>

    <div id="score-display"></div>
    <form id="quiz-form"></form>
    <button type="button" class="primary-btn" id="submit-btn" onclick="gradeQuiz()">Submit & View Full Solutions</button>
</div>

<script>
    // --- UTILITY FUNCTIONS ---
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // --- COMPREHENSIVE GENERATION ENGINE (GTU METHODS) ---
    const generators = {
        "matrix": {
            "mcq": [
                () => { // Method 1: Order of Multiplication
                    let r1 = rand(1, 4), c1 = rand(2, 4), r2 = c1, c2 = rand(1, 4);
                    return {
                        en: `If matrix $A$ is of order $${r1} \\times ${c1}$ and $B$ is $${r2} \\times ${c2}$, what is the order of $AB$?`,
                        gu: `જો શ્રેણિક $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${r2} \\times ${c2}$ હોય, તો શ્રેણિક $AB$ ની કક્ષા શું થાય?`,
                        correct: `$${r1} \\times ${c2}$`, distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`],
                        solEn: `Order of multiplication $A_{m \\times n} B_{n \\times p}$ is $m \\times p$.`, solGu: `ગુણાકાર $A_{m \\times n} B_{n \\times p}$ ની કક્ષા $m \\times p$ થાય.`
                    };
                },
                () => { // Method 2: Adjoint of 2x2
                    let a = rand(-5, 5), b = rand(-5, 5), c = rand(-5, 5), d = rand(-5, 5);
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, then $\\text{adj}(A) =$ ?`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $\\text{adj}(A) =$ ?`,
                        correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-d} & ${b} \\\\ ${c} & ${-a} \\end{bmatrix}$`],
                        solEn: `Swap main diagonal elements, change signs of off-diagonal elements.`, solGu: `મુખ્ય વિકર્ણના ઘટકોની અદલાબદલી કરો અને અન્ય ઘટકોના ચિહ્નો બદલો.`
                    };
                },
                () => { // Method 3: Scalar Multiplication
                    let k = rand(2, 5), a = rand(1, 4), b = rand(-3, 3), c = rand(-2, 4), d = rand(0, 5);
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, then $${k}A =$ ?`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $${k}A =$ ?`,
                        correct: `$\\begin{bmatrix} ${k*a} & ${k*b} \\\\ ${k*c} & ${k*d} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${k*a} & ${b} \\\\ ${c} & ${k*d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a+k} & ${b+k} \\\\ ${c+k} & ${d+k} \\end{bmatrix}$`, `$\\begin{bmatrix} ${k*a} & ${k*b} \\\\ ${c} & ${d} \\end{bmatrix}$`],
                        solEn: `Multiply every element inside the matrix by $${k}$.`, solGu: `શ્રેણિકના દરેક ઘટકને $${k}$ વડે ગુણો.`
                    };
                },
                () => { // Method 4: Matrix Equality
                    let x = rand(2, 8), y = rand(1, 5), c = rand(1, 9);
                    return {
                        en: `If $\\begin{bmatrix} x - 1 & ${c} \\\\ 2 & y + 2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} & ${c} \\\\ 2 & ${y+2} \\end{bmatrix}$, then $x+y =$ ?`,
                        gu: `જો $\\begin{bmatrix} x - 1 & ${c} \\\\ 2 & y + 2 \\end{bmatrix} = \\begin{bmatrix} ${x-1} & ${c} \\\\ 2 & ${y+2} \\end{bmatrix}$ હોય, તો $x+y =$ ?`,
                        correct: `$${x+y}$`, distractors: [`$${x+y+2}$`, `$${x+y-1}$`, `$${x-y}$`],
                        solEn: `Equating elements: $x-1 = ${x-1} \\implies x=${x}$. And $y+2 = ${y+2} \\implies y=${y}$. Sum = $${x+y}$.`, solGu: `ઘટકો સરખાવતા: $x=${x}$ અને $y=${y}$. સરવાળો = $${x+y}$.`
                    };
                },
                () => { // Method 5: Transpose property
                    return {
                        en: `If $A$ and $B$ are compatible matrices, then $(AB)^T =$ ?`,
                        gu: `જો $A$ અને $B$ યોગ્ય શ્રેણિક હોય, તો $(AB)^T =$ ?`,
                        correct: `$B^T A^T$`, distractors: [`$A^T B^T$`, `$A B^T$`, `$A^{-1} B^{-1}$`],
                        solEn: `By the reversal law of transposes, $(AB)^T = B^T A^T$.`, solGu: `પરિવર્ત શ્રેણિકના નિયમ મુજબ, $(AB)^T = B^T A^T$.`
                    };
                }
            ],
            "examples": [
                () => { // Example 1: Matrix Eq 2A + X = 3B
                    let a1 = rand(1,3), a2 = rand(-2,2), a3 = rand(0,4), a4 = rand(1,3);
                    let b1 = rand(2,4), b2 = rand(1,3), b3 = rand(-1,3), b4 = rand(2,5);
                    return {
                        en: `Find matrix $X$ if $2A + X = 3B$, where $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$.`,
                        gu: `જો સમીકરણ $2A + X = 3B$ હોય, જ્યાં $A$ અને $B$ આપેલ છે, તો શ્રેણિક $X$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${3*b1 - 2*a1} & ${3*b2 - 2*a2} \\\\ ${3*b3 - 2*a3} & ${3*b4 - 2*a4} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${2*a1 + 3*b1} & ${2*a2 + 3*b2} \\\\ ${2*a3 + 3*b3} & ${2*a4 + 3*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${3*b1 - a1} & ${3*b2 - a2} \\\\ ${3*b3 - a3} & ${3*b4 - a4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${b1 - a1} & ${b2 - a2} \\\\ ${b3 - a3} & ${b4 - a4} \\end{bmatrix}$`],
                        solEn: `$X = 3B - 2A$. Compute $3B$ and subtract $2A$ element by element.`, solGu: `$X = 3B - 2A$. $3B$ ની ગણતરી કરો અને તેમાંથી $2A$ બાદ કરો.`
                    };
                },
                () => { // Example 2: Linear Equations using Matrices
                    let x = rand(1, 3), y = rand(1, 3);
                    let a = rand(2, 4), b = rand(1, 3), c = rand(1, 3), d = rand(2, 4);
                    let e = a*x + b*y, f = c*x - d*y;
                    return {
                        en: `Solve using matrix method: $${a}x + ${b}y = ${e}$ and $${c}x - ${d}y = ${f}$.`,
                        gu: `શ્રેણિક ની મદદ થી સમીકરણ $${a}x + ${b}y = ${e}$ અને $${c}x - ${d}y = ${f}$ ઉકેલો.`,
                        correct: `$x = ${x}, y = ${y}$`, distractors: [`$x = ${y}, y = ${x}$`, `$x = -${x}, y = ${y}$`, `$x = ${x+1}, y = ${y-1}$`],
                        solEn: `Use $X = A^{-1}B$. Determinant $|A| = (${a})(-${d}) - (${b})(${c})$. Multiply inverse by constant matrix.`, solGu: `$X = A^{-1}B$ નો ઉપયોગ કરો. વ્યસ્ત શ્રેણિક શોધીને $x, y$ મેળવો.`
                    };
                },
                () => { // Example 3: Matrix Multiplication AB
                    let a1=rand(1,2), a2=rand(0,2), a3=rand(-1,1), a4=rand(1,3);
                    let b1=rand(2,3), b2=rand(-1,1), b3=rand(1,2), b4=rand(0,2);
                    let c1 = a1*b1+a2*b3, c2 = a1*b2+a2*b4, c3 = a3*b1+a4*b3, c4 = a3*b2+a4*b4;
                    return {
                        en: `If $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ and $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$, find $AB$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a1} & ${a2} \\\\ ${a3} & ${a4} \\end{bmatrix}$ અને $B = \\begin{bmatrix} ${b1} & ${b2} \\\\ ${b3} & ${b4} \\end{bmatrix}$ હોય, તો $AB$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${c1} & ${c2} \\\\ ${c3} & ${c4} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${c1+1} & ${c2} \\\\ ${c3} & ${c4-1} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a1*b1} & ${a2*b2} \\\\ ${a3*b3} & ${a4*b4} \\end{bmatrix}$`, `$\\begin{bmatrix} ${c4} & ${c3} \\\\ ${c2} & ${c1} \\end{bmatrix}$`],
                        solEn: `Multiply rows of A with columns of B: $C_{11} = (${a1})(${b1}) + (${a2})(${b3}) = ${c1}$, etc.`, solGu: `A ની હાર અને B ના સ્તંભનો ગુણાકાર કરો.`
                    };
                },
                () => { // Example 4: A^2 - kA
                    let a = 1, b = 2, c = 2, d = 3; // Fixed simple matrix
                    let k = 4;
                    let a2_1 = a*a+b*c, a2_2 = a*b+b*d, a2_3 = c*a+d*c, a2_4 = c*b+d*d;
                    let ans1 = a2_1 - k*a, ans2 = a2_2 - k*b, ans3 = a2_3 - k*c, ans4 = a2_4 - k*d;
                    return {
                        en: `If $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$, evaluate $A^2 - ${k}A$.`,
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો $A^2 - ${k}A$ શોધો.`,
                        correct: `$\\begin{bmatrix} ${ans1} & ${ans2} \\\\ ${ans3} & ${ans4} \\end{bmatrix}$`, distractors: [`$\\begin{bmatrix} ${ans1+2} & ${ans2} \\\\ ${ans3} & ${ans4} \\end{bmatrix}$`, `$\\begin{bmatrix} 0 & 0 \\\\ 0 & 0 \\end{bmatrix}$`, `$\\begin{bmatrix} ${a*a - k*a} & ${b*b - k*b} \\\\ ${c*c - k*c} & ${d*d - k*d} \\end{bmatrix}$`],
                        solEn: `First find $A \\cdot A$, then subtract $${k}$ times matrix $A$.`, solGu: `પ્રથમ $A \\cdot A$ શોધો, પછી તેમાંથી $${k}A$ બાદ કરો.`
                    }
                }
            ]
        },
        "differentiation": {
            "mcq": [
                () => { // Method 1: Power Rule
                    let n = rand(4, 9);
                    return {
                        en: `$\\frac{d}{dx}(x^{${n}}) = $ ?`, gu: `$\\frac{d}{dx}(x^{${n}}) = $ ?`,
                        correct: `$${n}x^{${n-1}}$`, distractors: [`$${n}x^{${n}}$`, `$\\frac{x^{${n+1}}}{${n+1}}$`, `$x^{${n-1}}$`],
                        solEn: `Power rule: $\\frac{d}{dx}(x^n) = n x^{n-1}$.`, solGu: `ઘાતના નિયમ મુજબ: $\\frac{d}{dx}(x^n) = n x^{n-1}$.`
                    };
                },
                () => { // Method 2: Chain Rule (sin kx)
                    let k = rand(2, 6);
                    return {
                        en: `$\\frac{d}{dx}(\\sin ${k}x) = $ ?`, gu: `$\\frac{d}{dx}(\\sin ${k}x) = $ ?`,
                        correct: `$${k}\\cos ${k}x$`, distractors: [`$\\cos ${k}x$`, `$-${k}\\cos ${k}x$`, `$\\frac{\\cos ${k}x}{${k}}$`],
                        solEn: `Chain rule: $\\cos(${k}x) \\cdot \\frac{d}{dx}(${k}x) = ${k}\\cos ${k}x$.`, solGu: `સાંકળ નિયમ મુજબ: $\\cos(${k}x) \\cdot \\frac{d}{dx}(${k}x) = ${k}\\cos ${k}x$.`
                    };
                },
                () => { // Method 3: Exponential / Log rule
                    let a = rand(2, 7);
                    return {
                        en: `$\\frac{d}{dx}(${a}^x) = $ ?`, gu: `$\\frac{d}{dx}(${a}^x) = $ ?`,
                        correct: `$${a}^x \\log_e ${a}$`, distractors: [`$x \\cdot ${a}^{x-1}$`, `$${a}^x$`, `$\\frac{${a}^x}{\\log_e ${a}}$`],
                        solEn: `Standard formula: $\\frac{d}{dx}(a^x) = a^x \\log_e a$.`, solGu: `પ્રમાણિત સૂત્ર: $\\frac{d}{dx}(a^x) = a^x \\log_e a$.`
                    };
                },
                () => { // Method 4: Identity trick
                    return {
                        en: `$\\frac{d}{dx}(\\sec^2 x - \\tan^2 x) = $ ?`, gu: `$\\frac{d}{dx}(\\sec^2 x - \\tan^2 x) = $ ?`,
                        correct: `$0$`, distractors: [`$1$`, `$2\\sec x \\tan x$`, `$-1$`],
                        solEn: `Trig identity: $\\sec^2 x - \\tan^2 x = 1$. Derivative of constant 1 is 0.`, solGu: `ત્રિકોણમિતીય નિત્યસમ: $\\sec^2 x - \\tan^2 x = 1$. અચળ 1 નું વિકલન 0 થાય.`
                    };
                },
                () => { // Method 5: Point evaluation
                    return {
                        en: `If $f(x) = \\log_e x$, then $f'(1) = $ ?`, gu: `જો $f(x) = \\log_e x$ હોય, તો $f'(1) = $ ?`,
                        correct: `$1$`, distractors: [`$0$`, `$-1$`, `$e$`],
                        solEn: `$f'(x) = 1/x$. Evaluating at $x=1$ gives $1/1 = 1$.`, solGu: `$f'(x) = 1/x$. $x=1$ મુકતા 1 મળે.`
                    };
                }
            ],
            "examples": [
                () => { // Example 1: Velocity & Acceleration
                    let a = rand(1, 2), b = rand(2, 5), t = rand(2, 3);
                    let v = 3*a*t*t - 2*b*t;
                    return {
                        en: `The motion of a particle is given by $S = ${a}t^3 - ${b}t^2 + 5t$. Find its velocity at $t = ${t}$ sec.`,
                        gu: `એક કણની ગતિનું સમીકરણ $S = ${a}t^3 - ${b}t^2 + 5t$ છે. $t = ${t}$ સેકન્ડે તેનો વેગ શોધો.`,
                        correct: `$${v + 5}$`, distractors: [`$${v}$`, `$${v - 5}$`, `$${3*a*t - 2*b + 5}$`],
                        solEn: `Velocity $V = \\frac{dS}{dt} = ${3*a}t^2 - ${2*b}t + 5$. Substitute $t=${t}$.`, solGu: `વેગ $V = \\frac{dS}{dt} = ${3*a}t^2 - ${2*b}t + 5$. $t=${t}$ મુકો.`
                    };
                },
                () => { // Example 2: Implicit Differentiation
                    let r = rand(2, 5);
                    return {
                        en: `If $x^2 + y^2 = ${r*r}$, find $\\frac{dy}{dx}$.`,

                        en: `Mean of ${d.join(', ')} is:`, gu: `${d.join(', ')} નો મધ્યક:`,
                        correct: `$${sum/4}$`, distractors: [`$${(sum/4)+1}$`, `$${sum/3}$`, `$${sum}$`],
                        solEn: `Mean = Sum / Count = $${sum} / 4 = ${sum/4}$.`, solGu: `મધ્યક = સરવાળો / કુલ સંખ્યા = $${sum/4}$.`
                    }
                }
            ],
            "examples": [
                () => { // Example 1: Basic Mean calc
                    let d = Array.from({length: 5}, () => rand(4, 12));
                    let sum = d.reduce((a,b)=>a+b, 0);
                    return {
                        en: `Find the mean of the data: ${d.join(', ')}`,
                        gu: `માહિતીનો મધ્યક શોધો: ${d.join(', ')}`,
                        correct: `$${sum/5}$`, distractors: [`$${(sum/5 + 0.5).toFixed(1)}$`, `$${sum/4}$`, `$${sum}$`],
                        solEn: `Mean = $\\frac{\\Sigma x}{n} = \\frac{${sum}}{5} = ${sum/5}$.`, solGu: `મધ્યક $\\bar{x} = \\frac{\\Sigma x}{n} = \\frac{${sum}}{5} = ${sum/5}$.`
                    };
                },
                () => { // Example 2: Mean Deviation simple concept
                    let d = [2, 4, 6, 8, 10]; // Mean is 6. Devs: 4, 2, 0, 2, 4 = 12. MD = 12/5 = 2.4
                    return {
                        en: `Find the mean deviation of the data: 2, 4, 6, 8, 10.`,
                        gu: `2, 4, 6, 8, 10 નું સરેરાશ વિચલન શોધો.`,
                        correct: `$2.4$`, distractors: [`$6$`, `$3.2$`, `$0$`],
                        solEn: `Mean = 6. Absolute deviations: 4, 2, 0, 2, 4. Sum = 12. Mean Deviation = 12/5 = 2.4.`, solGu: `મધ્યક 6 છે. વિચલનોનો સરવાળો 12 થાય. 12/5 = 2.4.`
                    };
                },
                () => { // Example 3: Variance / Standard Deviation conceptually
                    return {
                        en: `If the variance of a dataset is 16, what is the standard deviation?`,
                        gu: `જો માહિતીનું વિચરણ 16 હોય, તો પ્રમાણિત વિચલન શું થાય?`,
                        correct: `$4$`, distractors: [`$256$`, `$8$`, `$16$`],
                        solEn: `Standard Deviation = $\\sqrt{\\text{Variance}} = \\sqrt{16} = 4$.`, solGu: `પ્રમાણિત વિચલન = $\\sqrt{\\text{વિચરણ}} = \\sqrt{16} = 4$.`
                    };
                },
                () => { // Example 4: Missing frequency logic conceptually
                    return {
                        en: `For a frequency distribution, $\\Sigma f_i = 20$ and $\\Sigma f_i x_i = 140$. Find the mean.`,
                        gu: `આવૃત્તિ વિતરણ માટે $\\Sigma f_i = 20$ અને $\\Sigma f_i x_i = 140$ છે. મધ્યક શોધો.`,
                        correct: `$7$`, distractors: [`$14$`, `$20$`, `$140$`],
                        solEn: `Mean $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i} = \\frac{140}{20} = 7$.`, solGu: `મધ્યક $\\bar{x} = \\frac{\\Sigma f_i x_i}{\\Sigma f_i} = \\frac{140}{20} = 7$.`
                    }
                }
            ]
        }
    };

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const scoreDisplay = document.getElementById('score-display');
        
        form.innerHTML = '';
        scoreDisplay.style.display = 'none';
        currentQuizData = [];

        // Exact Request: 30 MCQs OR 8 Examples
        const numQuestions = type === 'mcq' ? 30 : 8;
        const availableGenerators = generators[topic][type] || generators[topic]['mcq']; 

        for (let i = 0; i < numQuestions; i++) {
            // Loop through available methods systematically to guarantee variety
            const genFunc = availableGenerators[i % availableGenerators.length];
            const qData = genFunc();

            // Prepare options array
            let options = [{text: qData.correct, isCorrect: true}];
            qData.distractors.forEach(d => options.push({text: d, isCorrect: false}));
            options = shuffle(options);
            qData.shuffledOptions = options;

            currentQuizData.push(qData);

            // Construct DOM
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit & View Full Solutions";
        
        // Trigger MathJax to render the LaTeX code
        MathJax.typesetPromise([form]);
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Explanation:</strong> ${qData.solEn}<br><br><strong>સમજૂતી:</strong> ${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Explanation:</strong> ${qData.solEn}<br><br><strong>સમજૂતી:</strong> ${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            // Disable radio buttons to lock answers
            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.innerHTML = `Your Score: ${score} / ${currentQuizData.length}`;
        scoreDisplay.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = "Practice Session Completed";

        // Re-render MathJax inside the newly visible solution blocks
        MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
