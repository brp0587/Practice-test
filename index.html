<script>
    // Utility Math & Array Functions
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Timer Logic
    let timerInterval;
    let secondsElapsed = 0;
    function startTimer() {
        clearInterval(timerInterval);
        secondsElapsed = 0;
        const timerDisplay = document.getElementById('timer-display');
        timerDisplay.style.display = 'block';
        timerDisplay.innerText = "⏱ 00:00";
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            let s = (secondsElapsed % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `⏱ ${m}:${s}`;
        }, 1000);
    }
    function stopTimer() {
        clearInterval(timerInterval);
        let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
        let s = (secondsElapsed % 60).toString().padStart(2, '0');
        return `${m} minutes and ${s} seconds`;
    }

    // MEGA-GENERATORS: Exhaustive, mathematically robust, strict formatting.
    const generators = {
        "matrix": {
            "mcq": [
                () => { 
                    let r1 = rand(2, 4), c1 = rand(2, 4); 
                    let c2 = rand(2, 4); 
                    return { 
                        en: `If matrix $A$ is $${r1} \\times ${c1}$ and $B$ is $${c1} \\times ${c2}$, what is the order of $AB$?`, 
                        gu: `જો $A$ ની કક્ષા $${r1} \\times ${c1}$ અને $B$ ની કક્ષા $${c1} \\times ${c2}$ હોય, તો $AB$ ની કક્ષા:`, 
                        correct: `$${r1} \\times ${c2}$`, 
                        distractors: [`$${c1} \\times ${r1}$`, `$${c1} \\times ${c2}$`, `Not possible`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Check compatibility</span><br>Matrix multiplication is only possible if the columns of the first matrix equal the rows of the second. Here, $A$ has ${c1} columns and $B$ has ${c1} rows. They match.</div><div class="step-container"><span class="step-title">Step 2: Determine new order</span><br>The resulting matrix takes the rows of the first matrix and columns of the second matrix. Thus, the new order is $${r1} \\times ${c2}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: શરત ચકાસો</span><br>A ના સ્તંભ (${c1}) અને B ની હાર (${c1}) સમાન છે.</div><div class="step-container"><span class="step-title">પગલું 2: નવી કક્ષા</span><br>પરિણામી શ્રેણિકની કક્ષા A ની હાર અને B ના સ્તંભ જેટલી થાય. તેથી $${r1} \\times ${c2}$.</div>` 
                    }; 
                },
                () => { 
                    let n = rand(2,4);
                    return { 
                        en: `If $A$ is a $${n} \\times ${n}$ square matrix and $|A| = 0$, then $A$ is called:`, 
                        gu: `જો $${n} \\times ${n}$ ચોરસ શ્રેણિક $A$ માટે $|A| = 0$ હોય, તો $A$ ને શું કહેવાય?`, 
                        correct: `Singular Matrix`, distractors: [`Non-singular Matrix`, `Identity Matrix`, `Symmetric Matrix`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Recall definitions</span><br>A matrix is "Singular" if its determinant is zero ($|A| = 0$). It is "Non-singular" if its determinant is not zero ($|A| \\neq 0$).</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: વ્યાખ્યા</span><br>જો નિશ્ચાયક શૂન્ય ($|A| = 0$) હોય તો તેને અસામાન્ય (Singular) શ્રેણિક કહેવાય છે.</div>` 
                    }; 
                },
                () => { 
                    let a = rand(2,9); 
                    return { 
                        en: `Which of the following is true for transpose of matrices $A_{${a}\\times ${a}}$ and $B_{${a}\\times ${a}}$?`, 
                        gu: `શ્રેણિક $A$ અને $B$ ના પરિવર્ત માટે નીચેનામાંથી શું સાચું છે?`, 
                        correct: `$(AB)^T = B^T A^T$`, distractors: [`$(AB)^T = A^T B^T$`, `$(A+B)^T = A^T B^T$`, `$(AB)^T = A^{-1} B^{-1}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Reversal Law of Transposes</span><br>The transpose of a product of matrices is the product of their transposes in the reverse order. Thus, $(AB)^T = B^T A^T$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: નિયમ</span><br>ગુણાકારના પરિવર્ત માટે ક્રમ ઉલટાઈ જાય છે. તેથી, $(AB)^T = B^T A^T$.</div>` 
                    }; 
                },
                () => { 
                    let a = rand(1, 9);
                    return { 
                        en: `If $A \\cdot A^{-1} = I_{${a}}$, what is $I_{${a}}$?`, 
                        gu: `જો $A \\cdot A^{-1} = I_{${a}}$ હોય, તો $I_{${a}}$ શું છે?`, 
                        correct: `Identity Matrix`, distractors: [`Zero Matrix`, `Adjoint Matrix`, `Symmetric Matrix`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Matrix Inverse Property</span><br>When any non-singular matrix $A$ is multiplied by its inverse $A^{-1}$, the result is always the Identity (or Unit) Matrix, denoted by $I$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: ગુણધર્મ</span><br>કોઈપણ શ્રેણિક અને તેના વ્યસ્ત નો ગુણાકાર હંમેશા એકમ શ્રેણિક આપે છે.</div>` 
                    }; 
                },
                () => { 
                    let a = rand(-5, 5), b = rand(-5, 5), c = rand(-5, 5), d = rand(-5, 5); 
                    return { 
                        en: `Find the adjoint of $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, 
                        gu: `$A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ નો સહઅવયવજ શ્રેણિક (adj A) શોધો.`, 
                        correct: `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${-a} & ${-b} \\\\ ${-c} & ${-d} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Rule for 2x2 Adjoint</span><br>To find $\\text{adj}(A)$ for a $2 \\times 2$ matrix, swap the positions of the elements on the main diagonal (${a}$ and ${d}).</div><div class="step-container"><span class="step-title">Step 2: Sign Change</span><br>Change the signs of the off-diagonal elements. So ${b}$ becomes ${-b}, and ${c} becomes ${-c}.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> મુખ્ય વિકર્ણના ઘટકોની અદલાબદલી કરો.</div><div class="step-container"><span class="step-title">પગલું 2:</span> અન્ય વિકર્ણના ઘટકોના ચિહ્નો બદલો.</div>` 
                    }; 
                },
                () => { 
                    let k = rand(2, 5), a = rand(1, 4), d = rand(1, 4); 
                    return { 
                        en: `If $A = \\begin{bmatrix} ${a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$, then $${k}A =$ ?`, 
                        gu: `જો $A = \\begin{bmatrix} ${a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$ હોય, તો $${k}A =$ ?`, 
                        correct: `$\\begin{bmatrix} ${k*a} & 0 \\\\ 0 & ${k*d} \\end{bmatrix}$`, 
                        distractors: [`$\\begin{bmatrix} ${a+k} & 0 \\\\ 0 & ${d+k} \\end{bmatrix}$`, `$\\begin{bmatrix} ${k*a} & 0 \\\\ 0 & ${d} \\end{bmatrix}$`, `$\\begin{bmatrix} ${a} & 0 \\\\ 0 & ${k*d} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Scalar Multiplication</span><br>When multiplying a matrix by a scalar (number), every single element inside the matrix must be multiplied by that scalar.</div><div class="step-container"><span class="step-title">Step 2: Calculation</span><br>$${k} \\times ${a} = ${k*a}$ and $${k} \\times ${d} = ${k*d}$. Zeros remain zero.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> શ્રેણિકના દરેક ઘટકને બહારની સંખ્યા (${k}) વડે ગુણવામાં આવે છે.</div>` 
                    }; 
                }
            ],
            "examples": [
                () => { 
                    let a = rand(1, 3), b = rand(1, 3), c = rand(2, 4), d = rand(4, 6); 
                    let det = (a*d) - (b*c); 
                    if(det === 0) { d++; det = (a*d) - (b*c); } 
                    return { 
                        en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$.`, 
                        gu: `જો $A = \\begin{bmatrix} ${a} & ${b} \\\\ ${c} & ${d} \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`, 
                        correct: `$\\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`, 
                        distractors: [`$\\frac{1}{${det}}\\begin{bmatrix} ${a} & ${-b} \\\\ ${-c} & ${d} \\end{bmatrix}$`, `$\\frac{1}{${det+1}}\\begin{bmatrix} ${d} & ${b} \\\\ ${c} & ${a} \\end{bmatrix}$`, `$\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Find Determinant</span><br>$|A| = ad - bc = (${a})(${d}) - (${b})(${c}) = ${det}$. Since $|A| \\neq 0$, inverse exists.</div><div class="step-container"><span class="step-title">Step 2: Find Adjoint</span><br>Swap main diagonal and change signs of the other: $\\text{adj}(A) = \\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$.</div><div class="step-container"><span class="step-title">Step 3: Apply Inverse Formula</span><br>$A^{-1} = \\frac{1}{|A|} \\text{adj}(A) = \\frac{1}{${det}}\\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1: નિશ્ચાયક</span><br>$|A| = (${a})(${d}) - (${b})(${c}) = ${det}$.</div><div class="step-container"><span class="step-title">પગલું 2: સહઅવયવજ શ્રેણિક</span><br>$\\text{adj}(A) = \\begin{bmatrix} ${d} & ${-b} \\\\ ${-c} & ${a} \\end{bmatrix}$.</div><div class="step-container"><span class="step-title">પગલું 3: સૂત્ર</span><br>$A^{-1} = \\frac{1}{|A|} \\text{adj}(A)$ વાપરો.</div>` 
                    }; 
                },
                () => { 
                    let x = rand(1, 4);
                    return { 
                        en: `Find the inverse matrix $A^{-1}$ if $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & ${x} \\end{bmatrix}$.`, 
                        gu: `જો $A = \\begin{bmatrix} 3 & -1 & 2 \\\\ 4 & 1 & -1 \\\\ 5 & 0 & ${x} \\end{bmatrix}$ હોય, તો વ્યસ્ત શ્રેણિક $A^{-1}$ શોધો.`,

                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> $xy$ વડે ભાગીને ચલ અલગ કરો. પછી સંકલન કરી લઘુગણક નો નિયમ વાપરો.</div>` 
                    }; 
                },
                () => { 
                    return { 
                        en: `Solve: $(x+y+1)^2 \\frac{dy}{dx} = 1$.`, 
                        gu: `વિકલ સમીકરણ ઉકેલો: $(x+y+1)^2 \\frac{dy}{dx} = 1$.`, 
                        correct: `$y + 1 - \\tan^{-1}(x+y+1) = C$`, 
                        distractors: [`$\\log(x+y+1) = x + C$`, `$\\frac{(x+y+1)^3}{3} = x + C$`, `$\\tan^{-1}(x+y+1) = x + C$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Substitution</span><br>Let $v = x+y+1$. Differentiating wrt $x$ gives $\\frac{dv}{dx} = 1 + \\frac{dy}{dx} \\implies \\frac{dy}{dx} = \\frac{dv}{dx} - 1$.</div><div class="step-container"><span class="step-title">Step 2: Rewrite Equation</span><br>Substitute back: $v^2(\\frac{dv}{dx} - 1) = 1 \\implies \\frac{dv}{dx} = \\frac{1}{v^2} + 1 = \\frac{1+v^2}{v^2}$.</div><div class="step-container"><span class="step-title">Step 3: Integrate</span><br>Separate variables: $\\frac{v^2}{1+v^2} dv = dx$.<br>Rewrite LHS as $(1 - \\frac{1}{1+v^2})$. Integrating gives $v - \\tan^{-1}(v) = x + C$. Since $v=x+y+1$, the $x$'s cancel, leaving $y+1 - \\tan^{-1}(x+y+1) = C$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> $v = x+y+1$ ધારીને વિકલન કરો. સમીકરણમાં મૂકી સંકલન કરો.</div>` 
                    } 
                }
            ]
        },
        "statistics": {
            "mcq": [
                () => { 
                    let n = rand(5, 11); 
                    return { 
                        en: `The mean of the first ${n} natural numbers is:`, gu: `પ્રથમ ${n} પ્રાકૃતિક સંખ્યાઓનો મધ્યક શું છે?`, 
                        correct: `$${(n+1)/2}$`, distractors: [`$${n/2}$`, `$${n}$`, `$${(n+2)/2}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Use Formula</span><br>The sum of the first $n$ natural numbers is $\\frac{n(n+1)}{2}$. To find the mean, divide by $n$. The simplified formula is always $\\frac{n+1}{2}$.<br>For $n=${n}, Mean = $\\frac{${n}+1}{2} = ${(n+1)/2}$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> સૂત્ર $\\frac{n+1}{2}$ વાપરો.</div>`
                    }; 
                },
                () => { 
                    return { 
                        en: `Variance is equal to:`, gu: `વિચરણ એ કોની બરાબર છે?`, 
                        correct: `$(\\text{Standard Deviation})^2$`, distractors: [`$\\sqrt{\\text{Standard Deviation}}$`, `$\\text{Mean Deviation}$`, `$\\frac{\\text{Standard Deviation}}{\\text{Mean}}$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Definition</span><br>By standard statistical definition, Variance (denoted as $\\sigma^2$) is the square of the Standard Deviation (denoted as $\\sigma$).</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> વિચરણ = (પ્રમાણિત વિચલન)².</div>`
                    } 
                }
            ],
            "examples": [
                () => { 
                    return { 
                        en: `Find the mean deviation of the data: 2, 4, 6, 8, 10.`, 
                        gu: `2, 4, 6, 8, 10 નું સરેરાશ વિચલન શોધો.`, 
                        correct: `$2.4$`, distractors: [`$6$`, `$3.2$`, `$0$`], 
                        solEn: `<div class="step-container"><span class="step-title">Step 1: Find the Mean</span><br>Mean $\\bar{x} = \\frac{2+4+6+8+10}{5} = \\frac{30}{5} = 6$.</div><div class="step-container"><span class="step-title">Step 2: Absolute Deviations</span><br>Find $|x_i - \\bar{x}|$ for each number: $|2-6|=4$, $|4-6|=2$, $|6-6|=0$, $|8-6|=2$, $|10-6|=4$.</div><div class="step-container"><span class="step-title">Step 3: Final Average</span><br>Sum these deviations = $4+2+0+2+4 = 12$.<br>Mean Deviation = $\\frac{12}{5} = 2.4$.</div>`, 
                        solGu: `<div class="step-container"><span class="step-title">પગલું 1:</span> પ્રથમ મધ્યક 6 શોધો. પછી વિચલનોનો સરવાળો 12 મેળવી, સરેરાશ વિચલન 12/5 = 2.4 ગણો.</div>` 
                    }; 
                }
            ]
        }
    };

    let currentQuizData = [];

    function generateQuiz() {
        const topic = document.getElementById('topicSelect').value;
        const type = document.getElementById('typeSelect').value;
        const form = document.getElementById('quiz-form');
        const submitBtn = document.getElementById('submit-btn');
        const summaryCard = document.getElementById('summary-card');
        const actionBtns = document.getElementById('action-buttons');
        
        form.innerHTML = '';
        summaryCard.style.display = 'none';
        currentQuizData = [];

        startTimer();

        // Safe boundaries depending on topic array lengths
        const numQuestions = type === 'mcq' ? Math.min(30, generators[topic][type].length) : Math.min(15, generators[topic][type].length); 
        const availableGenerators = generators[topic][type]; 

        let generatorIndex = 0;
        
        for (let i = 0; i < numQuestions; i++) {
            let qData;
            let options;
            let attempts = 0;
            let isDuplicate = true;

            // STRICT ANTI-DUPLICATION ENGINE
            while (isDuplicate && attempts < 150) {
                const genFunc = availableGenerators[(generatorIndex + attempts) % availableGenerators.length];
                qData = genFunc();
                
                // 1. Ensure the exact question text hasn't been used yet
                let textExists = currentQuizData.some(existingQ => existingQ.en === qData.en);
                
                // 2. Ensure all 4 options generated are mathematically distinct
                let rawOptions = [{text: qData.correct, isCorrect: true}];
                qData.distractors.forEach(d => rawOptions.push({text: d, isCorrect: false}));
                let uniqueOptionTexts = new Set(rawOptions.map(o => String(o.text).trim()));
                
                if (textExists || uniqueOptionTexts.size < 4) {
                    isDuplicate = true;
                    attempts++;
                } else {
                    isDuplicate = false;
                    options = rawOptions;
                }
            }
            
            generatorIndex++;

            options = shuffle(options);
            qData.shuffledOptions = options;
            currentQuizData.push(qData);

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `
                <div class="bilingual-en">Q${i+1}. ${qData.en}</div>
                <div class="bilingual-gu">પ્રશ્ન ${i+1}. ${qData.gu}</div>
            `;
            qBlock.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            options.forEach((opt) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                const input = document.createElement('input');
                
                input.type = 'radio';
                input.name = `q${i}`;
                input.value = opt.isCorrect ? 'correct' : 'incorrect';
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;

                label.appendChild(input);
                label.appendChild(span);
                li.appendChild(label);
                optionsList.appendChild(li);
            });
            qBlock.appendChild(optionsList);

            const solutionDiv = document.createElement('div');
            solutionDiv.id = `solution-${i}`;
            solutionDiv.className = 'solution';
            qBlock.appendChild(solutionDiv);

            form.appendChild(qBlock);
        }

        actionBtns.style.display = 'flex';
        submitBtn.style.display = 'block';
        submitBtn.disabled = false;
        
        MathJax.typesetPromise([form]);
    }

    function gradeQuiz() {
        let score = 0;
        let answeredAll = true;

        currentQuizData.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) answeredAll = false;
        });

        if (!answeredAll) {
            alert("Please answer all questions before submitting.\n(કૃપા કરીને સબમિટ કરતા પહેલા બધા પ્રશ્નોના જવાબ આપો.)");
            return;
        }

        const timeTaken = stopTimer();
        document.getElementById('timer-display').style.display = 'none';

        currentQuizData.forEach((qData, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const solutionDiv = document.getElementById(`solution-${i}`);
            const isCorrect = selected.value === 'correct';

            if (isCorrect) {
                score++;
                solutionDiv.className = 'solution solution-correct';
                solutionDiv.innerHTML = `<strong>✓ Correct! (સાચો જવાબ)</strong><br><br><strong>Detailed Solution:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            } else {
                solutionDiv.className = 'solution solution-incorrect';
                solutionDiv.innerHTML = `<strong>✗ Incorrect. (ખોટો જવાબ)</strong><br>The correct answer is: <strong>${qData.correct}</strong>.<br><br><strong>Detailed Solution:</strong><br>${qData.solEn}<br><br><strong>સમજૂતી:</strong><br>${qData.solGu}`;
            }
            solutionDiv.style.display = 'block';

            const inputs = document.querySelectorAll(`input[name="q${i}"]`);
            inputs.forEach(input => input.disabled = true);
        });

        const percentage = Math.round((score / currentQuizData.length) * 100);
        let feedbackMsg = "";
        let feedbackColor = "";
        
        if(percentage >= 80) { feedbackMsg = "Excellent Preparation! Keep it up. (ખૂબ સરસ તૈયારી!)"; feedbackColor = "#059669"; }
        else if(percentage >= 50) { feedbackMsg = "Good job, but keep practicing. (સારી મહેનત, વધુ પ્રેક્ટિસ કરો.)"; feedbackColor = "#d97706"; }
        else { feedbackMsg = "Needs more focus and practice. (વધુ ધ્યાન અને પ્રેક્ટિસ ની જરૂર છે.)"; feedbackColor = "#dc2626"; }

        const summaryCard = document.getElementById('summary-card');
        summaryCard.innerHTML = `
            <div class="summary-title">Test Completed!</div>
            <div class="summary-stats">
                Score: <strong>${score} / ${currentQuizData.length}</strong> (${percentage}%)<br>
                Time Taken: <strong>${timeTaken}</strong>
            </div>
            <div class="summary-msg" style="background-color: ${feedbackColor}; color: white;">${feedbackMsg}</div>
        `;
        summaryCard.style.display = 'block';

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.style.display = 'none';

        MathJax.typesetPromise();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
